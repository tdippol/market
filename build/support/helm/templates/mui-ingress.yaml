{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mui-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.class }}
  labels:
    {{- include "mui_app.labels" . | nindent 4 }}
spec:
  rules:
  - http:
      paths:
      - path: /mui
        pathType: Prefix
        backend:
          service:
            name: mui-service
            port:
              number: 8080
{{- end }}
