# Root logger option
log4j.rootLogger=WARN, stdout, muilog

log4j.appender.stdout.Threshold=INFO
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

log4j.appender.muilog=org.apache.log4j.RollingFileAppender
log4j.appender.muilog.File=muilog.log
log4j.appender.muilog.layout=org.apache.log4j.PatternLayout
log4j.appender.muilog.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
log4j.appender.muilog.MaxFileSize=20MB
log4j.appender.muilog.MaxBackupIndex=5

log4j.appender.muilog.org.primefaces.PrimeFaces=ERROR
log4j.appender.stdout.org.primefaces.PrimeFaces=ERROR
