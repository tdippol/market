<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <!-- Dialog aggiunta utenti -->
                    <p:dialog widgetVar="dlgAddUtentiToGroup" resizable="false" closable="false" width="800"
                              styleClass="pf-dialog disable-horizontal-scroll" header="Aggiungi Utenti al Gruppo">
                        <h:form styleClass="formAddUsersToGroup">
                            <div class="row">
                                <div class="col-8">
                                    <p:selectCheckboxMenu id="groupUsers" multiple="true"
                                                          value="#{gestioneGruppi.gruppiUtentiBean.selectedUsers}"
                                                          class="input-field" style="width: 100%;"
                                                          filter="true" filterMatchMode="contains">
                                        <f:converter binding="#{usersConverter}" />
                                        <p:ajax event="change" update="@(.ui-confirmdialog-yes)" />
                                        <p:ajax event="toggleSelect" update="@(.ui-confirmdialog-yes)" />
                                        <f:selectItems value="#{gestioneGruppi.gruppiUtentiBean.availableUsers}"
                                                       var="u" itemValue="#{u}" itemLabel="#{u.name} - #{u.description}" />
                                    </p:selectCheckboxMenu>
                                </div>
                            </div>
                            <div class="row" style="margin-top: 40px;">
                                <div class="col-6">
                                    <p:commandButton value="Annulla" styleClass="ui-confirmdialog-no"
                                                     style="float: left;" process="@this"
                                                     oncomplete="PF('dlgAddUtentiToGroup').hide();" />
                                </div>
                                <div class="col-6">
                                    <p:commandButton styleClass="ui-confirmdialog-yes" value="Conferma"
                                                     actionListener="#{gestioneGruppi.addUsersToGroup}"
                                                     update="@(.formAddUsersToGroup), @(.updateableContent)"
                                                     disabled="#{empty gestioneGruppi.gruppiUtentiBean.selectedUsers}"
                                                     oncomplete="PF('dlgAddUtentiToGroup').hide();" />
                                </div>
                            </div>
                        </h:form>
                    </p:dialog>

                    <h:form>
                        <div class="row">
                            <div class="col-4">
                                <div>
                                    <p:outputLabel for="gruppo" value="Seleziona Gruppo" class="input-field-label" />
                                </div>
                                <div>
                                    <p:selectOneMenu id="gruppo" value="#{gestioneGruppi.selectedGroupCombo}"
                                                     class="input-field" style="width: 100%;" filter="true"
                                                     filterMatchMode="contains">
                                        <f:converter binding="#{groupsConverter}" />
                                        <p:ajax update="@(.updateableUtenti)" />
                                        <f:selectItems value="#{gestioneGruppi.groupList}" var="g"
                                                       itemLabel="#{g.codiceGruppo} - #{g.descrizione}"
                                                       itemValue="#{g}" />
                                    </p:selectOneMenu>
                                </div>
                            </div>
                        </div>
                        <div class="row" style="margin-top: 10px;">
                            <div class="col-6">
                                <p:panel header="Utenti Associati" toggleable="true" toggleSpeed="500" closeSpeed="500"
                                         styleClass="pnlGrid_Header updateableContent">

                                    <p:dataTable var="u" styleClass="pf-datatable updateableUtenti"
                                                 widgetVar="utentiTable"
                                                 value="#{gestioneGruppi.gruppiUtentiBean.utenti}"
                                                 rowKey="#{u.id}" rowIndexVar="rowIndex">
                                        <p:column headerText="Username" width="40%" sortBy="#{u.name}"
                                                  filterBy="#{u.name}" filterMatchMode="contains">
                                            <h:outputText value="#{u.name}" />
                                        </p:column>
                                        <p:column headerText="Descrizione" width="40%" sortBy="#{u.description}"
                                                  filterBy="#{u.description}" filterMatchMode="contains">
                                            <h:outputText value="#{u.description}" />
                                        </p:column>
                                        <p:column width="20%" style="text-align: center;">
                                            <p:commandButton icon="ui-icon-trash" title="Elimina Utente da Gruppo"
                                                             action="#{gestioneGruppi.removeUserFromGroup}"
                                                             update="@(.updateableContent)">
                                                <p:confirm header="Conferma Necessaria"
                                                           message="Confermi eliminazione utente dal gruppo?"
                                                           icon="ui-icon-alert" />
                                                <f:setPropertyActionListener value="#{u}"
                                                                             target="#{gestioneGruppi.gruppiUtentiBean.selectedUser}" />
                                            </p:commandButton>
                                        </p:column>
                                    </p:dataTable>

                                    <f:facet name="actions">
                                        <p:commandLink action="#{gestioneGruppi.openAddUtentiToGroupDialog}"
                                                       styleClass="pnlGrid_Header plusButton"
                                                       update="@(.formAddUsersToGroup)" />
                                    </f:facet>
                                </p:panel>
                            </div>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
