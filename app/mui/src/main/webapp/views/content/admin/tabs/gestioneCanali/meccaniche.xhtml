<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <!-- Dialog conferma disassociazione meccanica / canale -->
                    <p:confirmDialog widgetVar="confirmRemoveMeccFromCanale" header="Avviso" closable="false"
                                     styleClass="confirmRemoveMeccFromCanale" severity="alert"
                                     message="#{templateView.currentView.confirmRemoveMeccFromCanaleMsg}">
                        <p:commandButton value="SI" widgetVar="btnConfirmRemoveMeccFromCanale"
                                         action="#{templateView.currentView.removeMeccanicaFromCanale}"
                                         oncomplete="PF('confirmRemoveMeccFromCanale').hide()" />
                        <p:commandButton value="NO" widgetVar="btnCancelRemoveMeccFromCanale" style="float: right;"
                                         action="#{templateView.currentView.resetMeccanicaFromCanale}"
                                         update="@(.updateableCanale)"
                                         oncomplete="PF('confirmRemoveMeccFromCanale').hide()" />
                    </p:confirmDialog>

                    <h:form>
                        <p:dataTable var="status" styleClass="pf-datatable updateableCanale" style="width: 40%;"
                                     widgetVar="meccanicheTable" value="#{templateView.currentView.meccaniche}"
                                     rowKey="#{status.id}" rowIndexVar="rowIndex" >
                            <p:column headerText="Codice" width="40%" sortBy="#{status.codiceMeccanica}">
                                <h:outputText value="#{status.codiceMeccanica}" />
                            </p:column>
                            <p:column headerText="Descrizione" width="40%" >
                                <h:outputText value="#{status.descrizione}" />
                            </p:column>
                            <p:column width="20%" style="text-align: center;" >
                                <p:selectBooleanCheckbox value="#{status.selected}">
                                    <p:ajax event="valueChange" update="@(.meccanicheTable) @(.confirmRemoveMeccFromCanale)"
                                            listener="#{templateView.currentView.toggleCheckBox(status)}" />
                                </p:selectBooleanCheckbox>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
