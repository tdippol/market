<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://java.sun.com/jsf/html"
	  xmlns:f="http://java.sun.com/jsf/core"
	  xmlns:ui="http://java.sun.com/jsf/facelets"
	  xmlns:p="http://primefaces.org/ui">
<ui:composition>

	<div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
         <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
	                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" closable="true">
	            		<p:commandButton value="annulla" type="button" styleClass="ui-confirmdialog-no" />
	            		<p:commandButton value="conferma" type="button" styleClass="ui-confirmdialog-yes" />
	        		</p:confirmDialog>
	                <p:dialog widgetVar="dlgAddUIWV" minimizable="true" maximizable="true" width="800"
	                           resizable="false" draggable="true" closable="true" header="Aggiungi Interfaccia" styleClass="pf-dialog">
				        <h:form styleClass="formAddDialog">
				        <p:panelGrid>
					        <p:row>
					            <p:column style="text-align: left;">
					                <p:outputLabel for="name" value="Nome *" />
					                <br/>
					                <p:inputText id="name" value="#{gestioneUI.selectedUI.name}" style="width: 100%;"  maxlength="50" />
					            </p:column>
					        </p:row>
				            <p:row>
				                <p:column style="text-align: left;">
				                    <p:outputLabel for="description" value="Descrizione" />
				                    <br/>
				                    <p:inputText id="description" value="#{gestioneUI.selectedUI.description}" style="width: 100%;"  maxlength="250" />
				                </p:column>
				            </p:row>
					        <p:row>
					            <p:column style="text-align: right !important;">
					                <p:commandButton styleClass="pf-btn-confirm" value="conferma" actionListener="#{gestioneUI.addUI}"  update="@(.formAddDialog),@(.updateableContent)"/>
					                <p:commandButton styleClass="pf-btn-cancel" value="annulla" process="@this" oncomplete="PF('dlgAddUIWV').hide();" />
					            </p:column>
					        </p:row>
	        			</p:panelGrid>
	        		</h:form>
	    		</p:dialog>
	                <h:form>
			            <p:panel header="Lista Interfacce" toggleable="true" toggleSpeed="500" closeSpeed="500" styleClass="pnlGrid_Header updateableContent">
	        		        <p:dataTable var="ui" styleClass="pf-datatable" value="#{gestioneUI.uiList}"
	                             editable="true"
	                             rows="20"
	                             paginator="true"
	                             resizableColumns="true"
	                             paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
	                             rowsPerPageTemplate="20,50,100">
	                    	<p:ajax event="rowEdit" listener="#{gestioneUI.editUI}" />
		                    <p:column headerText="Nome" sortBy="#{ui.name}" filterBy="#{ui.name}" filterMatchMode="contains">
		                        <h:outputText value="#{ui.name}"/>
		                    </p:column>
		                    <p:column headerText="Descrizione" sortBy="#{role.description}" filterBy="#{role.description}" filterMatchMode="contains">
		                        <p:cellEditor>
		                            <f:facet name="output"><h:outputText value="#{ui.description}"/></f:facet>
		                            <f:facet name="input"> <p:inputText  value="#{ui.description}" style="width: 100%;"  maxlength="250"/></f:facet>
		                        </p:cellEditor>
		                    </p:column>
		                    <p:column style="width:40px;padding:3px!important;">
		                        <p:rowEditor styleClass="rowEditorButton" />
		                    </p:column>
		                    <p:column style="width:40px;padding:3px!important;">
		                        <p:commandButton icon="ui-icon-trash" title="Elimina Interfaccia" action="#{gestioneUI.deleteUI}" update="@(.updateableContent)">
		                            <p:confirm header="Conferma Necessaria" message="Confermi eliminazione Interfaccia?" icon="ui-icon-alert" />
		                            <f:setPropertyActionListener value="#{ui}" target="#{gestioneUI.selectedUI}" />
		                        </p:commandButton>
		                    </p:column>
	                	</p:dataTable>
		                	<p:dataTable var="ui" id="uiExp" style="display: none;" styleClass="pf-datatable" value="#{gestioneUI.uiList}">
		                    <p:column headerText="ID">
		                        <h:outputText value="#{ui.id}"/>
		                    </p:column>
		                    <p:column headerText="Nome">
		                        <h:outputText value="#{ui.name}"/>
		                    </p:column>
		                    <p:column headerText="Descrizione">
		                        <h:outputText value="#{ui.description}"/>
		                    </p:column>
		                </p:dataTable>
		    	            <f:facet name="actions">
		                    <p:commandLink  action="#{gestioneUI.openAddUIDialog}" styleClass="pnlGrid_Header plusButton" update="@(.formAddDialog)"/>
		                    <p:commandLink ajax="false" styleClass="pnlGrid_Header exportButton">
		                        <p:dataExporter type="xls" target="uiExp" fileName="listaUI" />
	    	                </p:commandLink>
	        	        </f:facet>
	            		</p:panel>
	        		</h:form>
				</div>
			</div>
		</div>
	</div>
</ui:composition>
</html>
