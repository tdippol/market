<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://java.sun.com/jsf/html"
	  xmlns:f="http://java.sun.com/jsf/core"
	  xmlns:ui="http://java.sun.com/jsf/facelets"
	  xmlns:p="http://primefaces.org/ui">

<ui:composition>
<div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
	<div class="row">
		<div class="col-12">
			<p:commandButton value="Copia da Canale" id="copyFromChannel" styleClass="pf-btn-confirm"
							 action="#{templateView.currentView.openCopyFromChannelDialog}"
							 oncomplete="PF('dlgCopyFromChannel').show()"
							 update="@(.dlgCopyFromChannelForm)" />
			<p:dialog widgetVar="dlgCopyFromChannel" resizable="false" closable="false"
					  styleClass="pf-dialog disable-horizontal-scroll"
					  width="600" height="25vh" header="Copia da Canale">
				<h:form id="copyFromChannelDlgForm" styleClass="dlgCopyFromChannelForm">
					<div class="row">
						<div class="col-6">
							<div>
								<p:outputLabel for="copyChannel" value="Da canale" style="font-size: 14px;" />
							</div>
							<div>
								<p:selectOneMenu id="copyChannel" class="input-field" style="width: 100%;"
												 filter="true" filterMatchMode="contains"
												 value="#{templateView.currentView.idCopyChannel}">
									<p:ajax update="@(.dlgCopyFromChannelForm) @(.ui-confirmdialog-yes)" />
									<f:selectItem itemLabel="Seleziona canale" noSelectionOption="true" />
									<f:selectItems value="#{templateView.currentView.channelsForCopy}" var="c"
												   itemLabel="#{c.descrizione}"
												   itemValue="#{c.id}" />
								</p:selectOneMenu>
							</div>
						</div>
					</div>
				</h:form>
				<f:facet name="footer">
					<div class="row">
						<div class="col-6">
							<p:commandButton value="Annulla" styleClass="ui-confirmdialog-no" style="float: left;"
											 action="#{templateView.currentView.resetCopyFromChannelDialog}"
											 onclick="PF('dlgCopyFromChannel').hide()" />
						</div>
						<div class="col-6">
							<p:commandButton id="copyFromChannelDlgConfirmBtn" value="Copia"
											 styleClass="ui-confirmdialog-yes"
											 action="#{templateView.currentView.confirmCopyFromChannel}"
											 oncomplete="PF('dlgCopyFromChannel').hide()"
											 update="@(.updateableWorkflow)" />
						</div>
					</div>
				</f:facet>
			</p:dialog>
		</div>
		<div class="col-12">
			<div id="k_grid_portletpromoGrid" class="k-portlet">
				<h:form>				
					<div class="row">
						<div class="col-3">
							<p:dataTable var="status"
								styleClass="pf-datatable updateableWorkflow"
								widgetVar="statiSelezionatiTable"
								value="#{templateView.currentView.selectedStatuses}"
								rowKey="#{status.stato.id}" rowIndexVar="rowIndex"
								selectionMode="single"
								selection="#{templateView.currentView.selectedStatus}"
								>
								<p:column headerText="Stato" width="100%">
									<h:outputText
										value="#{status.stato.codiceStato} - #{status.stato.label}" />
								</p:column>
					            <p:ajax event="rowSelect" listener="#{templateView.currentView.onStatusSelect}"
										update="@(.actionTable)" />
							</p:dataTable>
						</div>
						<div class="col-9">
							<p:dataTable var="action"
								styleClass="pf-datatable actionTable updateableWorkflow" style="width: 70%;"
								widgetVar="actionTable"
								value="#{templateView.currentView.availableActions}"
								rowKey="#{action.entity.id}" rowIndexVar="rowIndex"
								filteredValue="#{templateView.currentView.filteredActions}">
								<p:column headerText="Regola" width="25%" filterMatchMode="contains" filterBy="#{action.entity.codice}">
									<h:outputText
										value="#{action.entity.codice}" />
								</p:column>
								<p:column headerText="Descrizione" width="65%" filterMatchMode="contains" filterBy="#{action.entity.descrizione}">
									<h:outputText
										value="#{action.entity.descrizione}" />
								</p:column>
								<p:column headerText="Attiva" width="10%"
									style="text-align: center;">
									<p:selectBooleanCheckbox value="#{action.available}">
										<p:ajax event="valueChange" update="@(.updateableWorkflow)"
												listener="#{templateView.currentView.actionToggled(action)}" />
									</p:selectBooleanCheckbox>
								</p:column>
							</p:dataTable>
						</div>
					</div>
				</h:form>
          </div>
      </div>
  </div>
</div>
</ui:composition>

</html>
