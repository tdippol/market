<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pe="http://primefaces.org/ui/extensions">
<ui:composition>
    <p:dialog widgetVar="cancellaAuditLogDialog" modal="true" header="Cancella Audit Log" width="500"
              height="auto" resizable="false" styleClass="cancellaAuditLogDialog disable-scroll">
        <h:form id="cancellaAuditLogDialogForm">
            <div class="row">
                <p:outputPanel id="customPanel" style="margin-bottom:10px">
                    <p:selectOneRadio id="customRadio" value="#{gestioneApplicazione.auditLog.defaultDelete}" layout="custom">
                        <f:selectItem itemValue="ALL" />
                        <f:selectItem itemValue="MONTHS" />
                        <f:selectItem itemValue="WEEKS" />
                        <f:selectItem itemValue="DAYS" />
                        <f:selectItem itemValue="LIMIT" />
                        <p:ajax partialSubmit="true" update="@form"/>
                    </p:selectOneRadio>
                    <h:panelGrid columns="3" cellpadding="5">
                        <p:radioButton id="opt1" for="customRadio" itemIndex="0" />
                        <h:outputLabel for="opt1" value="Cancella Tutto" />
                        <p:inputNumber disabled="true" type="hidden"/>

                        <p:radioButton id="opt2" for="customRadio" itemIndex="1" />
                        <h:outputLabel for="opt2" value="Cancella ultimi mesi" />
                        <p:inputNumber id="inputMonths" value="#{gestioneApplicazione.auditLog.months}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultDelete != 'MONTHS'}"/>

                        <p:radioButton id="opt3" for="customRadio" itemIndex="2" />
                        <h:outputLabel for="opt3" value="Cancella ultime settimane" />
                        <p:inputNumber id="inputWeeks" value="#{gestioneApplicazione.auditLog.weeks}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultDelete != 'WEEKS'}"/>

                        <p:radioButton id="opt4" for="customRadio" itemIndex="3" />
                        <h:outputLabel for="opt4" value="Cancella ultimi giorni" />
                        <p:inputNumber id="inputDays" value="#{gestioneApplicazione.auditLog.days}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultDelete != 'DAYS'}"/>

                        <p:radioButton id="opt5" for="customRadio" itemIndex="4" />
                        <h:outputLabel for="opt5" value="Cancella tutto prima di" />
                        <p:inputMask id="inputBefore" value="#{gestioneApplicazione.auditLog.limit}" mask="99.99.9999"
                                     disabled="#{gestioneApplicazione.auditLog.defaultDelete != 'LIMIT'}" onkeyup="insertLimitDate();"/>
                    </h:panelGrid>
                </p:outputPanel>
            </div>

            <div class="row">
                <div class="col-6">
                    <p:commandButton value="Annulla" type="button" styleClass="ui-confirmdialog-no"
                                     style="float: left;" onclick="PF('cancellaAuditLogDialog').hide()" />
                </div>
                <div class="col-6">
                    <p:commandButton id="deleteAuditLogConfirmBtn" value="Conferma" styleClass="ui-confirmdialog-yes"
                                     action="#{gestioneApplicazione.auditLog.deleteAuditLog}"
                                     update="@(.updateableContent)"
                                     disabled="#{gestioneApplicazione.auditLog.deleteDisabled}"
                                     oncomplete="PF('cancellaAuditLogDialog').hide()"
                    />
                </div>
            </div>
            <p:remoteCommand name="insertLimitDate" update="deleteAuditLogConfirmBtn"/>
        </h:form>
    </p:dialog>
    <style type="text/css">
	    .disable-scroll .ui-dialog-content {
          overflow: hidden !important;
        }
	</style>
</ui:composition>
</html>
