<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <h:form>
                        <div class="row">
                            <div class="col-9">
                                <p:dataTable var="s" styleClass="pf-datatable statiBloccoTable updateableStatiBlocco"
                                             widgetVar="statiBloccoTable" selectionMode="single" style="width: 50%;"
                                             value="#{templateView.currentView.repartiConfigurati}"
                                             rowKey="#{s.key}" rowIndexVar="rowIndex">
                                    <p:column headerText="Codice Reparto" width="20%">
                                        <h:outputText value="#{s.reparto.codiceReparto}" />
                                    </p:column>
                                    <p:column headerText="Descrizione" width="45%">
                                        <h:outputText value="#{s.reparto.descrizione}" />
                                    </p:column>
                                    <p:column headerText="Max Testate" width="15%" style="text-align: center;">
                                        <p:inputNumber minValue="0" decimalPlaces="0" style="width: 50px;" disabled="#{!s.selected}" value="#{s.maxTestate}" >
                                            <f:ajax event="blur" update="@(.updateableStatiBlocco)"
                                                    listener="#{templateView.currentView.totaleChanged(s)}"
                                            />
                                        </p:inputNumber>
                                    </p:column>
                                    <p:column headerText="Attivo" width="15%" style="text-align: center;">
                                        <p:selectBooleanCheckbox value="#{s.selected}">
                                            <p:ajax event="valueChange" update="@(.updateableStatiBlocco)"
                                                    listener="#{templateView.currentView.repartoToggled(s)}" />
                                        </p:selectBooleanCheckbox>
                                    </p:column>
                                </p:dataTable>
                            </div>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
