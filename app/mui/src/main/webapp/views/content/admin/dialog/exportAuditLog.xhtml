<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pe="http://primefaces.org/ui/extensions">
<ui:composition>
    <p:dialog widgetVar="exportAuditLogDialog" modal="true" header="Export Audit Log" width="600"
              height="auto" resizable="false" styleClass="exportAuditLogDialog disable-scroll">
        <h:form id="exportAuditLogDialogForm">
            <div class="row">
                <p:outputPanel id="customPanel" style="margin-bottom:10px">
                    <p:selectOneRadio id="customRadio" value="#{gestioneApplicazione.auditLog.defaultExport}" layout="custom">
                        <f:selectItem itemValue="ALL" />
                        <f:selectItem itemValue="MONTHS" />
                        <f:selectItem itemValue="WEEKS" />
                        <f:selectItem itemValue="DAYS" />
                        <f:selectItem itemValue="LIMIT" />
                        <p:ajax partialSubmit="true" update="@form"/>
                    </p:selectOneRadio>
                    <h:panelGrid columns="5" cellpadding="5">
                        <p:radioButton id="opt1" for="customRadio" itemIndex="0" />
                        <h:outputLabel for="opt1" value="Esporta Tutto" />
                        <p:inputNumber disabled="true" type="hidden"/>
                        <p:inputNumber disabled="true" type="hidden"/>
                        <p:inputNumber disabled="true" type="hidden"/>

                        <p:radioButton id="opt2" for="customRadio" itemIndex="4" />
                        <h:outputLabel for="opt2" value="Esporta da " />
                        <p:inputMask id="inputFrom" value="#{gestioneApplicazione.auditLog.from}" mask="99.99.9999"
                                     disabled="#{gestioneApplicazione.auditLog.defaultExport != 'LIMIT'}" onkeyup="insertLimitDate();"/>
                        <h:outputLabel for="inputFrom" value=" a " />
                        <p:inputMask id="inputTo" value="#{gestioneApplicazione.auditLog.to}" mask="99.99.9999"
                                     disabled="#{gestioneApplicazione.auditLog.defaultExport != 'LIMIT'}" onkeyup="insertLimitDate();"/>

                        <p:radioButton id="opt3" for="customRadio" itemIndex="1" />
                        <h:outputLabel for="opt3" value="Esporta ultimi mesi" />
                        <p:inputNumber id="inputMonths" value="#{gestioneApplicazione.auditLog.months}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultExport != 'MONTHS'}"/>
                        <p:inputNumber disabled="true" type="hidden" />
                        <p:inputNumber disabled="true" type="hidden"/>

                        <p:radioButton id="opt4" for="customRadio" itemIndex="2" />
                        <h:outputLabel for="opt4" value="Esporta ultime settimane" />
                        <p:inputNumber id="inputWeeks" value="#{gestioneApplicazione.auditLog.weeks}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultExport != 'WEEKS'}"/>
                        <p:inputNumber disabled="true" type="hidden"/>
                        <p:inputNumber disabled="true" type="hidden"/>

                        <p:radioButton id="opt5" for="customRadio" itemIndex="3" />
                        <h:outputLabel for="opt5" value="Esporta ultimi giorni" />
                        <p:inputNumber id="inputDays" value="#{gestioneApplicazione.auditLog.days}" decimalPlaces="0"
                                       disabled="#{gestioneApplicazione.auditLog.defaultExport != 'DAYS'}"/>
                        <p:inputNumber disabled="true" type="hidden"/>
                        <p:inputNumber disabled="true" type="hidden"/>

                    </h:panelGrid>
                </p:outputPanel>
            </div>

            <div class="row">
                <div class="col-6">
                    <p:commandButton value="Annulla" type="button" styleClass="ui-confirmdialog-no"
                                     style="float: left;" onclick="PF('exportAuditLogDialog').hide()" />
                </div>
                <div class="col-6">
                    <p:commandButton ajax="false" id="exportAuditLogConfirmBtn" value="Conferma" styleClass="ui-confirmdialog-yes"
                                     update="@(.updateableContent)"
                                     disabled="#{gestioneApplicazione.auditLog.exportDisabled}"
                                     onclick="PF('exportAuditLogDialog').hide()">
                        <p:fileDownload value="#{gestioneApplicazione.auditLog.exportExcel}" />
                    </p:commandButton>
                </div>
            </div>

            <p:remoteCommand name="insertLimitDate" update="exportAuditLogConfirmBtn"/>
        </h:form>
    </p:dialog>
    <style type="text/css">
	.disable-scroll .ui-dialog-content {
      overflow: hidden !important;
    }
	</style>
</ui:composition>
</html>
