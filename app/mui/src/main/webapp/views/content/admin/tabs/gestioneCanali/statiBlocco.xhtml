<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
				<p:commandButton value="Copia da Canale" id="copyFromChannel" styleClass="pf-btn-confirm"
								 action="#{templateView.currentView.openCopyFromChannelDialog}"
								 oncomplete="PF('dlgCopyFromChannel').show()"
								 update="@(.dlgCopyFromChannelForm)" />

				<!-- Dialog Copia Da Canale -->
				<p:dialog widgetVar="dlgCopyFromChannel" resizable="false" closable="false"
						  styleClass="pf-dialog disable-horizontal-scroll"
						  width="600" height="25vh" header="Copia da Canale">
					<h:form id="copyFromChannelDlgForm" styleClass="dlgCopyFromChannelForm">
						<div class="row">
							<div class="col-6">
								<div>
									<p:outputLabel for="copyChannel" value="Da canale" style="font-size: 14px;" />
								</div>
								<div>
									<p:selectOneMenu id="copyChannel" styleClass="input-field" style="width: 100%;"
													 filter="true" filterMatchMode="contains"
													 value="#{templateView.currentView.idCopyChannel}">
										<p:ajax update="@(.dlgCopyFromChannelForm) @(.ui-confirmdialog-yes)" />
										<f:selectItem itemLabel="Seleziona canale" noSelectionOption="true" />
										<f:selectItems value="#{templateView.currentView.channelsForCopy}" var="c"
													   itemLabel="#{c.descrizione}"
													   itemValue="#{c.id}" />
									</p:selectOneMenu>
								</div>
							</div>
						</div>
					</h:form>

					<f:facet name="footer">
						<div class="row">
							<div class="col-6">
								<p:commandButton value="Annulla" styleClass="ui-confirmdialog-no" style="float: left;"
												 action="#{templateView.currentView.resetCopyFromChannelDialog}"
												 onclick="PF('dlgCopyFromChannel').hide()" />
							</div>
							<div class="col-6">
								<p:commandButton id="copyFromChannelDlgConfirmBtn" value="Copia"
												 styleClass="ui-confirmdialog-yes"
												 disabled="#{empty templateView.currentView.idCopyChannel}"
												 action="#{templateView.currentView.confirmCopyFromChannel}"
												 oncomplete="PF('dlgCopyFromChannel').hide()"
												 update="@(.updateableStatiBlocco)" />
							</div>
						</div>
					</f:facet>
				</p:dialog>

            </div>

			<div class="col-12">
				<div id="k_grid_portletpromoGrid" class="k-portlet">
					<h:form>
						<div class="row">
							<div class="col-9">
								<p:dataTable var="s" styleClass="pf-datatable statiBloccoTable updateableStatiBlocco"
											 widgetVar="statiBloccoTable" selectionMode="single" style="width: 70%;"
											 value="#{templateView.currentView.availableStatiBlocco}"
											 rowKey="#{s.entity.id}" rowIndexVar="rowIndex">
									<p:column headerText="Codice Stato" width="20%">
										<h:outputText value="#{s.entity.codiceStato}" />
									</p:column>
									<p:column headerText="Descrizione Stato" width="65%">
										<h:outputText value="#{s.entity.descrizione}" />
									</p:column>
									<p:column headerText="Blocco Attivo" width="15%" style="text-align: center;">
										<p:selectBooleanCheckbox value="#{s.available}">
											<p:ajax event="valueChange" update="@(.updateableStatiBlocco)"
													listener="#{templateView.currentView.statoBloccoToggled(s)}" />
										</p:selectBooleanCheckbox>
									</p:column>
								</p:dataTable>
							</div>
						</div>
					</h:form>
				</div>
			</div>
        </div>
    </div>
</ui:composition>
</html>
