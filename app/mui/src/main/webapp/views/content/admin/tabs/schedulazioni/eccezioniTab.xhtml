<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <p:remoteCommand name="resetToDefault" action="#{templateView.currentView.adminModeOverrideBean.resetToDefault}"
                         update="@(.rolePanel) @(.menuPanel)" />
        <p:confirmDialog widgetVar="resetDialog" closable="false" styleClass="muiDialog"
                         showEffect="fade" hideEffect="fade" header="Reset eccezioni"
                         message="Sei sicuro di voler resettare tutte le eccezioni?">
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ax-dialog-btn-push-left"
                             onclick="PF('resetDialog').hide()" />
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes ax-dialog-btn-push-right"
                             update="tableRole treeMenu" onclick="resetToDefault()" />
        </p:confirmDialog>

        <div class="row">
            <div class="col-12 text-center">
                <p:commandButton value="RESET A DEFAULT" icon="fa fa-fw fa-redo" onclick="PF('resetDialog').show()"
                                 styleClass="pf-btn-danger" />
            </div>
        </div>
        <div class="row" style="padding-top: 20px;">
            <div class="col-6">
                <h:form>
                    <p:panel widgetVar="rolePanel" style="margin-bottom:10px;" styleClass="rolePanel">
                        <p:dataTable value="#{templateView.currentView.adminModeOverrideBean.roles}"
                                     scrollable="true" scrollHeight="640"
                                     var="role" id="tableRole"
                                     styleClass="pf-datatable" selectionMode="single" rowKey="#{role.id}"
                                     selection="#{templateView.currentView.adminModeOverrideBean.selectedRole}">
                            <p:ajax event="rowSelect" update="@(.menuPanel)"
                                    listener="#{templateView.currentView.adminModeOverrideBean.onRowSelected}" />
                            <p:column headerText="Ruolo" width="400">
                                <h:outputText value="#{role.name}" />
                            </p:column>
                            <p:column headerText="Override Admin" style="text-align: center" width="100">
                                <p:selectBooleanCheckbox value="#{role.overrideAdmin}">
                                    <p:ajax event="valueChange" update="@(.menuPanel)"
                                            listener="#{templateView.currentView.adminModeOverrideBean.toggleOverrideAdminForRole(role)}" />
                                </p:selectBooleanCheckbox>
                            </p:column>
                        </p:dataTable>
                        <f:facet name="footer">
                            <div class="row">
                                <div class="col-12">
                                    <p:commandButton value="Seleziona tutti" styleClass="pf-btn-confirm"
                                                     icon="fa fa-fw fa-check-square" update="tableRole"
                                                     action="#{templateView.currentView.adminModeOverrideBean.selectAllRoles}" />
                                    <p:commandButton value="Deseleziona tutti" styleClass="pf-btn-cancel"
                                                     icon="fa fa-fw fa-square" update="tableRole"
                                                     action="#{templateView.currentView.adminModeOverrideBean.deselectAllRoles}" />
                                </div>
                            </div>
                        </f:facet>
                    </p:panel>
                </h:form>
            </div>
            <div class="col-6">
                <h:form>
                    <p:panel header="Menu per ruolo: #{templateView.currentView.adminModeOverrideBean.selectedRole.name}"
                             style="width: 100%; max-height: 640px; overflow: auto; display: block;" styleClass="menuPanel">
                        <p:tree value="#{templateView.currentView.adminModeOverrideBean.menu}" var="node" dynamic="false"
                                selectionMode="checkbox" id="treeMenu" styleClass="menuPanel" style="width: 100%;"
                                widgetVar="treeMenu" selection="#{templateView.currentView.adminModeOverrideBean.selectedNodes}">
                            <p:ajax event="select" update="@(.menuPanel)"
                                    listener="#{templateView.currentView.adminModeOverrideBean.onTreeNodeSelect}" />
                            <p:ajax event="unselect" update="@(.menuPanel)"
                                    listener="#{templateView.currentView.adminModeOverrideBean.onTreeNodeUnselect}" />
                            <p:treeNode type="folder" expandedIcon="fa fa-fw fa-minus-square"
                                        collapsedIcon="fa fa-fw fa-plus-square">
                                <h:outputText value="#{node.label} [#{node.idMenu}]"
                                              style="min-height:30px !important" />
                            </p:treeNode>
                            <p:treeNode type="external" icon="fa fa-fw fa-external-link-square-alt">
                                <h:outputText value="#{node.label} [#{node.idMenu}]"
                                              style="min-height:30px !important" />
                            </p:treeNode>
                            <p:treeNode type="internal" icon="fa fa-fw fa-splotch">
                                <h:outputText value="#{node.label} [#{node.idMenu}]"
                                              style="min-height:30px !important" />
                            </p:treeNode>
                        </p:tree>
                        <f:facet name="footer">
                            <div class="row">
                                <div class="col-12">
                                    <p:commandButton value="Seleziona tutti" styleClass="pf-btn-confirm"
                                                     icon="fa fa-fw fa-check-square" update="treeMenu"
                                                     disabled="#{templateView.currentView.adminModeOverrideBean.btnSelectAllMenusDisabled}"
                                                     action="#{templateView.currentView.adminModeOverrideBean.selectAllMenus}" />
                                    <p:commandButton value="Deseleziona tutti" styleClass="pf-btn-cancel"
                                                     icon="fa fa-fw fa-square" update="treeMenu"
                                                     disabled="#{templateView.currentView.adminModeOverrideBean.btnDeselectAllMenusDisabled}"
                                                     action="#{templateView.currentView.adminModeOverrideBean.deselectAllMenus}" />
                                </div>
                            </div>
                        </f:facet>
                    </p:panel>
                </h:form>
            </div>
        </div>
    </div>
</ui:composition>
</html>
