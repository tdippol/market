<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <!-- Dialog aggiunta grm -->
                    <p:dialog widgetVar="dlgAddGrmToGroup" resizable="false" closable="false" width="800"
                              styleClass="pf-dialog disable-horizontal-scroll" header="Aggiungi Grm al Gruppo">
                        <h:form styleClass="formAddGrmToGroup">
                            <div class="row">
                                <div class="col-12">
                                    <p:panel header="Seleziona Grm" style="margin-bottom: 10px;">
                                        <p:selectManyMenu id="grmSelector" styleClass="grmSelector" filter="false"
                                                          value="#{gestioneGruppi.gruppiGrmBean.selectedGrm}"
                                                          showCheckbox="true" style="width: 100%;">
                                            <p:ajax event="change" update="@(.ui-confirmdialog-yes)" />
                                            <f:converter binding="#{grmConverter}" />
                                            <f:selectItems value="#{gestioneGruppi.gruppiGrmBean.availableGrm}"
                                                           var="g" itemValue="#{g}"
                                                           itemLabel="[#{g.codice}] #{g.descrizione}" />
                                        </p:selectManyMenu>
                                        <f:facet name="footer">
                                            <div class="row">
                                                <div class="col-6">
                                                    <p:commandButton value="Seleziona tutti" styleClass="pf-btn-confirm"
                                                                     icon="fa fa-fw fa-check-square"
                                                                     action="#{gestioneGruppi.selectAllGrm}"
                                                                     disabled="#{empty gestioneGruppi.gruppiGrmBean.availableGrm}"
                                                                     update="@(.grmSelector), @(.ui-confirmdialog-yes)" />
                                                    <p:commandButton value="Deseleziona tutti"
                                                                     styleClass="pf-btn-cancel"
                                                                     icon="fa fa-fw fa-square"
                                                                     action="#{gestioneGruppi.deselectAllGrm}"
                                                                     disabled="#{empty gestioneGruppi.gruppiGrmBean.availableGrm}"
                                                                     update="@(.grmSelector), @(.ui-confirmdialog-yes)" />
                                                </div>
                                                <div class="col-4">
                                                    <div style="float: left; margin-top: 15px;">Tipo Accesso</div>
                                                    <p:inputSwitch showLabels="true" label="Accesso"
                                                                   value="#{gestioneGruppi.gruppiGrmBean.tipoAccesso}"
                                                                   style="margin-left: 10px; margin-top: 13px !important;"
                                                                   onLabel="W" offLabel="R">
                                                        <p:ajax update="@(.formAddGrmToGroup)" />
                                                        <f:converter binding="#{tipoAccessoConverter}" />
                                                    </p:inputSwitch>
                                                </div>
                                            </div>
                                        </f:facet>
                                    </p:panel>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <p:commandButton value="Annulla" styleClass="ui-confirmdialog-no"
                                                     style="float: left;" process="@this"
                                                     oncomplete="PF('dlgAddGrmToGroup').hide();" />
                                </div>
                                <div class="col-6">
                                    <p:commandButton value="Conferma" styleClass="ui-confirmdialog-yes"
                                                     actionListener="#{gestioneGruppi.addGrmToGroup}"
                                                     update="@(.formAddGrmToGroup), @(.updateableContent)"
                                                     disabled="#{empty gestioneGruppi.gruppiGrmBean.selectedGrm}"
                                                     oncomplete="PF('dlgAddGrmToGroup').hide();" />
                                </div>
                            </div>
                        </h:form>
                    </p:dialog>

                    <!-- Dialog conferma copia da gruppo senza grm -->
                    <p:confirmDialog widgetVar="dlgGroupNoGrm" header="Attenzione" styleClass="dlgGroupNoGrm"
                                     message="Stai copiando da un gruppo senza grm associati. Confermi?"
                                     severity="alert">
                        <p:commandButton value="SI" update="@(.updateableGrm)"
                                         action="#{gestioneGruppi.confirmCopyGrmFromGroup}"
                                         oncomplete="PF('dlgGroupNoGrm').hide(); PF('dlgCopyGrmFromGroup').hide()" />
                        <p:commandButton value="NO" onclick="PF('dlgGroupNoGrm').hide()"
                                         style="float: right;" type="button" />
                    </p:confirmDialog>

                    <!-- Dialog copia -->
                    <p:dialog widgetVar="dlgCopyGrmFromGroup" resizable="false" closable="false"
                              styleClass="pf-dialog disable-horizontal-scroll"
                              width="600" height="25vh" header="Copia da Gruppo">
                        <h:form id="copyGrmFromGroupDlgForm" styleClass="dlgCopyGrmFromGroupForm">
                            <div class="row">
                                <div class="col-6">
                                    <div>
                                        <p:outputLabel for="copyGroup" value="Da gruppo" style="font-size: 14px;" />
                                    </div>
                                    <div>
                                        <p:selectOneMenu id="copyGroup" styleClass="input-field" style="width: 100%;"
                                                         filter="true" filterMatchMode="contains"
                                                         value="#{gestioneGruppi.gruppiGrmBean.idCopyGroup}">
                                            <p:ajax update="@(.dlgCopyGrmFromGroupForm) @(.ui-confirmdialog-yes)" />
                                            <f:selectItem itemLabel="Seleziona gruppo" noSelectionOption="true" />
                                            <f:selectItems value="#{gestioneGruppi.gruppiGrmBean.groupsForCopy}"
                                                           var="g" itemLabel="#{g.descrizione}" itemValue="#{g.id}" />
                                        </p:selectOneMenu>
                                    </div>
                                </div>
                            </div>
                        </h:form>
                        <f:facet name="footer">
                            <div class="row">
                                <div class="col-6">
                                    <p:commandButton value="Annulla" styleClass="ui-confirmdialog-no" style="float: left;"
                                                     action="#{gestioneGruppi.resetCopyGrmFromGroupDialog}"
                                                     onclick="PF('dlgCopyGrmFromGroup').hide()" />
                                </div>
                                <div class="col-6">
                                    <p:commandButton id="copyGrmFromGroupDlgConfirmBtn" value="Copia"
                                                     styleClass="ui-confirmdialog-yes"
                                                     action="#{gestioneGruppi.preConfirmCopyGrmFromGroup}"
                                                     update="@(.dlgGroupNoGrm) @(.updateableGrm)" />
                                </div>
                            </div>
                        </f:facet>
                    </p:dialog>

                    <h:form>
                        <div class="row">
                            <div class="col-4">
                                <div>
                                    <p:outputLabel for="gruppo" value="Seleziona Gruppo" class="input-field-label" />
                                </div>
                                <div>
                                    <p:selectOneMenu id="gruppo" value="#{gestioneGruppi.selectedGroupCombo}"
                                                     class="input-field" style="width: 100%;" filter="true"
                                                     filterMatchMode="contains">
                                        <f:converter binding="#{groupsConverter}" />
                                        <p:ajax update="@(.updateableGrm) @(.grm-massive-action)" />
                                        <f:selectItems value="#{gestioneGruppi.groupList}" var="g"
                                                       itemLabel="#{g.codiceGruppo} - #{g.descrizione}"
                                                       itemValue="#{g}" />
                                    </p:selectOneMenu>
                                </div>
                            </div>
                            <div class="col-8">
                                <p:commandButton value="Copia" id="copyFromGroup" styleClass="pf-btn-confirm"
                                                 style="float: right;"
                                                 action="#{gestioneGruppi.openCopyGrmFromGroupDialog}"
                                                 oncomplete="PF('dlgCopyGrmFromGroup').show()"
                                                 update="@(.dlgCopyGrmFromGroupForm)" />
                            </div>
                        </div>
                        <div class="row" style="margin-top: 10px;">
                            <div class="col-6">
                                <p:panel header="Grm Associati" toggleable="true" toggleSpeed="500" closeSpeed="500"
                                         styleClass="pnlGrid_Header updateableContent">

                                    <div class="row">
                                        <div class="col-12">
                                            <p:commandButton action="#{gestioneGruppi.removeAllGrm}"
                                                             styleClass="pf-btn-danger grm-massive-action"
                                                             style="float: right; margin-left: 10px;"
                                                             disabled="#{empty gestioneGruppi.gruppiGrmBean.grm}"
                                                             value="Elimina tutti" icon="far fa-fw fa-trash-alt"
                                                             update="@(.updateableGrm) @(.grm-massive-action)">
                                                <p:confirm header="Attenzione" icon="ui-icon-alert"
                                                           message="Confermi l'eliminazione di tutti i grm dal gruppo?" />
                                            </p:commandButton>
                                            <p:commandButton action="#{gestioneGruppi.changeGrmAllWrite}"
                                                             styleClass="pf-btn-confirm grm-massive-action"
                                                             style="float: right; margin-left: 10px;"
                                                             disabled="#{empty gestioneGruppi.gruppiGrmBean.grm}"
                                                             value="Imposta WRITE tutti"
                                                             update="@(.updateableGrm)">
                                                <p:confirm header="Attenzione" icon="ui-icon-alert"
                                                           message="Confermi il tipo accesso WRITE per tutti i grm?" />
                                            </p:commandButton>
                                            <p:commandButton action="#{gestioneGruppi.changeGrmAllRead}"
                                                             styleClass="pf-btn-confirm grm-massive-action"
                                                             style="float: right;"
                                                             disabled="#{empty gestioneGruppi.gruppiGrmBean.grm}"
                                                             value="Imposta READ tutti"
                                                             update="@(.updateableGrm)">
                                                <p:confirm header="Attenzione" icon="ui-icon-alert"
                                                           message="Confermi il tipo accesso READ per tutti i grm?" />
                                            </p:commandButton>
                                        </div>
                                    </div>

                                    <p:dataTable var="gg" styleClass="pf-datatable updateableGrm" widgetVar="grmTable"
                                                 value="#{gestioneGruppi.gruppiGrmBean.grm}"
                                                 rowKey="#{gg.id}" rowIndexVar="rowIndex">
                                        <p:column headerText="Grm" width="50%">
                                            <h:outputText value="[#{gg.grm.codice}] #{gg.grm.descrizione}" />
                                        </p:column>
                                        <p:column headerText="Tipo Accesso" width="30%" style="text-align: center;">
                                            <p:inputSwitch onLabel="W" offLabel="R" value="#{gg.tipoAccesso}">
                                                <f:converter binding="#{tipoAccessoConverter}" />
                                                <p:ajax update="@(.grmTable)"
                                                        listener="#{gestioneGruppi.toggleGrmSecurity}" />
                                                <f:attribute value="#{gg}" name="toggleEntity" />
                                            </p:inputSwitch>
                                        </p:column>
                                        <p:column width="20%" style="text-align: center;">
                                            <p:commandButton icon="ui-icon-trash" title="Elimina Grm da Gruppo"
                                                             action="#{gestioneGruppi.removeGrmFromGroup}"
                                                             update="@(.updateableContent)">
                                                <p:confirm header="Conferma Necessaria"
                                                           message="Confermi eliminazione grm dal gruppo?"
                                                           icon="ui-icon-alert" />
                                                <f:setPropertyActionListener value="#{gg}"
                                                                             target="#{gestioneGruppi.gruppiGrmBean.selectedGruppoGrm}" />
                                            </p:commandButton>
                                        </p:column>
                                    </p:dataTable>

                                    <f:facet name="actions">
                                        <p:commandLink action="#{gestioneGruppi.openAddGrmToGroupDialog}"
                                                       styleClass="pnlGrid_Header plusButton"
                                                       update="@(.formAddGrmToGroup)" />
                                    </f:facet>
                                </p:panel>
                            </div>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </div>
    <style>
        .ui-inputswitch {
            margin-top: 5px !important;
        }

        .ui-inputswitch-on > span {
            color: #ffffff !important;
        }

        .grm-massive-action.ui-state-disabled {
            opacity: .35 !important;
        }
    </style>
</ui:composition>
</html>
