        <div class="col-12">
            <p:panel id="pianificazioneMessaggi" toggleable="true" toggleSpeed="500"
                     closeSpeed="500"
                     styleClass="pnlGrid_Header expandable_pianificazione_messaggi_grid">
                <f:facet name="header">
                    <p:outputLabel value=""/>
                </f:facet>
                <h:panelGroup layout="block" styleClass="ag-theme-balham"
                              style="width: 100%; height: 30vh;"
                              pt:gridid="pianificazione_messaggi_grid">
                </h:panelGroup>
                <f:facet name="actions">
                    <p:inputText autocomplete="off" id="pianificazione_messaggi_quickfilter"
                                 placeholder="Filtra..." styleClass="pnlGrid_Header filterInputText"
                                 onkeyup="onFilterTextBoxChangedpromoGrid('pianificazione_messaggi_grid', this.value)" />
                    <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                   onclick="expandGrid('pianificazione_messaggi_grid')"
                                   onerror="redirectToExpiredPage()" />
                    <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                   onclick="onBtExport('pianificazione_messaggi_grid', 'Pianificazione - Messaggi')"
                                   onerror="redirectToExpiredPage()" />
                    <p:commandButton id="preview" title="Preview" styleClass="pnlGrid_Header previewButton"
                                     actionListener="#{templateView.currentView.messaggiCastellettiBean.messaggiBean.fetchHtml}"
                                     oncomplete="inject(xhr, status, args)">
                        <p:overlayPanel for="preview" appendTo="@(body)" styleClass="previewPanel centered-overlay"
                                        widgetVar="previewMessaggiPanelWidget">
                            <div class="remoteContent" />
                        </p:overlayPanel>
                    </p:commandButton>
                </f:facet>

                <script type="text/javascript">
                    var idPianificazione = $('.idPianificazioneClass').text();
                    var dispositivi = $('.devicesClass').text();
                    var dispositivo = dispositivi;
                    var nodeToGo = undefined;
                    if ( dispositivi.indexOf(',') != -1) {
                        dispositivo = dispositivi.split(',')[0];
                    }

                    var gridParamsPianificazioneMessaggi = {
                        gridId: 'db_pianificazione_messaggi_grid',
                        gridTabGroup: 'pianificazione_messaggi_grid_tabs',
                        gridTabPosition: 0,
                        gridCode: 'pianificazione_messaggi_grid',
                        url_columnDefs: contextPath + '/resources/pianificazionepromo/messaggi/columnDef'
                            + addUrlParamContesto(#{muiContext}),
                    url_rowData: contextPath + '/resources/pianificazionepromo/messaggi/rowData/' + dispositivo + '/'
                    + idPianificazione + addUrlParamContesto(#{muiContext}),
                    url_customSort: contextPath + '/resources/grid/sorting/pianificazione_messaggi_grid',
                        gridOptions: {
                        onSortChanged: function (event) {
                            onSortChanged(event, contextPath + '/resources/grid/sorting/save/pianificazione_messaggi_grid');
                        },
                        onSelectionChanged: onRowSelected
                    },
                    additionColumnDefs: [
                        {
                            headerName: '',
                            width: 75,
                            cellRenderer: 'MessaggiPianificazione_ButtonsRenderer',
                            position: 'prepend',
                            pinned: 'left'
                        }
                    ]
                    };

                    function inject(xhr, status, args) {
                        // debugger;
                        PF('previewMessaggiPanelWidget').show();
                        $('.remoteContent').html(args.html);
                    }

                    function onTabShow(event) {
                        // 2. carica i dati della griglia corrispondente al tab
                        var dispositivi = $('.devicesClass').text();
                        dispositivo = dispositivi;
                        if (dispositivi.indexOf(',') != -1) {
                            dispositivo = dispositivi.split(',')[event];
                        }
                        refreshGrid();
                        updateTabContent();
                    }

                    function refreshGrid() {
                        var grid = getGridOptionFromGridMap('pianificazione_messaggi_grid');
                        $.ajax({
                            url: contextPath + '/resources/pianificazionepromo/messaggi/rowData/' + dispositivo + '/'
                                + idPianificazione + addUrlParamContesto(#{muiContext}),
                        method: 'GET',
                            success: function(response) {
                            if ( response.hasOwnProperty("rowData") ) {
                                LT('Set rowData', response.rowData);
                                grid.api.setRowData(response.rowData);
                            } else {
                                LT('Errore nel recupero dei dati', response);
                                grid.api.setGridOption("rowData",  []);
                            }
                        },
                        error: function(xhr, status, error) {
                            addInfoGrowl([
                                {name: 'title', value: 'Errore'},
                                {
                                    name: 'message',
                                    value: 'Errore nel recupero dei dati'
                                }
                            ]);
                            console.error('Error fetching data:', error);
                            if ( xhr.status == 404 ) {
                                console.log('Endpoint not found:', xhr);
                            }
                            if ( grid.hasAttribute("api") ) {
                                grid.api.setRowData([]);
                            }
                            return null;
                        }
                    });
                    }

                    function onRowSelected(event) {
                        var nodes = event.api.getSelectedNodes();
                        if (nodes &amp;&amp; nodes.length > 0) {
                            nodeToGo = nodes[0];
                            selezionaMessaggio([
                                {name: 'messaggioSelected', value: Number(nodes[0].data.id.value)},

                            ]);
                            prepareDispositiviRowIndex([
                                {name: 'rowIndex', value: Number(nodes[0].rowIndex)}
                            ]);
                        }
                    }

                    function changeRow() {
                        if (nodeToGo) {
                            nodeToGo.setSelected(true, true);
                        } else {
                            console.warn("Errore selezionando riga destinazione");
                        }
                    }

                    function clearSelection() {
                        var grid = getGridOptionFromGridMap('pianificazione_messaggi_grid');
                        if (grid) {
                            grid.api.deselectAll();
                        }
                    }

                    function callDeleteMessageWs() {
                        var idMessaggio = $('.idMessageToBeDeletedClass').text();
                        if (idMessaggio &amp;&amp; idMessaggio != '') {
                            $.ajax({
                                type: "DELETE",
                                url: contextPath + '/resources/pianificazionepromo/messaggi/' + idMessaggio,
                                contentType: "text/plain",
                                success: function (data) {
                                    getGridOptionFromGridMap('pianificazione_messaggi_grid').api.setRowData(data.rowData);
                                    addInfoGrowl([
                                        {name: 'title', value: 'Messaggio eliminato'},
                                        {
                                            name: 'message',
                                            value: 'Il messaggio è stato eliminato correttamente'
                                        }
                                    ]);
                                    resetForm();
                                },
                                error: ajaxErrorHandler
                            })
                        }
                        PF('deleteMessaggeConfirmDialog').hide();
                    }

                    $(document).ready(function () {
                        if (getCurrentTab(gridParamsPianificazioneMessaggi.gridTabGroup) == gridParamsPianificazioneMessaggi.gridTabPosition) {
                            creaGriglia(gridParamsPianificazioneMessaggi);
                        }
                    });
                </script>

            </p:panel>
        </div>
    </h:panelGroup>
    <p:remoteCommand name="selezionaMessaggio" update="@(.updatableMessageContent) @(.btnAggiorna)"
                     action="#{templateView.currentView.messaggiCastellettiBean.messaggiBean.selezionaMessaggio}" />
    <p:remoteCommand name="deleteMessaggioPianificazione" update="deleteMessaggeConfirmDialog"
                     action="#{templateView.currentView.messaggiCastellettiBean.messaggiBean.prepareDeleteMessageDialog}" />
    <p:remoteCommand name="insertMessageAbove" update="@(.updatableMessageContent)"
                     action="#{templateView.currentView.messaggiCastellettiBean.messaggiBean.addMessageAbove}"
                     oncomplete="refreshGrid();" />
    <p:remoteCommand name="resetForm" update="@(.updatableMessageContent) @(.idMessageToBeDeletedClass)"
                     action="#{templateView.currentView.messaggiCastellettiBean.messaggiBean.resetMessage}" />
    <p:remoteCommand name="updateTabContent" action="#{templateView.currentView.messaggiCastellettiBean.fetchMessaggi}"
                     update="@(.previewPanel)" />
    <p:remoteCommand name="updateIndex" action="#{templateView.currentView.messaggiCastellettiBean.updateActiveIndex}"
                     update="@(.updatableMessageContent)" />
    <p:remoteCommand name="prepareDispositiviRowIndex"
                     actionListener="#{templateView.currentView.messaggiCastellettiBean.prepareDispositiviRowIndex}"
                     update="@(.updatableMessageContent)"/>

    <!-- messaggio di errore se non ci sono dispositivi -->
    <h:panelGroup layout="block" style="text-align: center; font-weight: bold; color: firebrick;"
                  rendered="#{not templateView.currentView.messaggiCastellettiBean.renderTabs}">
        <h:outputText value="Nessun dispositivo selezionato in pianificazione; messaggi non disponibili" />
    </h:panelGroup>

    <!-- dialog conferma eliminazione riga messaggio -->
    <p:confirmDialog id="deleteMessaggeConfirmDialog" widgetVar="deleteMessaggeConfirmDialog"
                     global="true" showEffect="fade" hideEffect="fade" closable="false"
                     icon="pi pi-exclamation-triangle" styleClass="muiDialog" header="Avviso"
                     message="Sei sicuro di voler cancellare il messaggio corrente?">
        <p:commandButton value="No" type="button"
                         styleClass="ui-confirmdialog-no ax-dialog-btn-push-left"
                         onclick="PF('deleteMessaggeConfirmDialog').hide()" />
        <p:commandButton value="Si" type="button"
                         styleClass="ui-confirmdialog-yes ax-dialog-btn-push-right"
                         update="@(.updatableMessageContent)"
                         onclick="callDeleteMessageWs()" />
        <p:outputLabel value="#{ templateView.currentView.messaggiCastellettiBean.messaggiBean.idMessageToBeDeleted }"
                       class="idMessageToBeDeletedClass" style="visibility: hidden;" />
    </p:confirmDialog>
