<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:ui="http://java.sun.com/jsf/facelets"
>

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletReportArticoliPromoGrid" class="k-portlet" style="background: #ececec;">
                    <div class="ui-g-12" style="padding: 10px;">
                        <div class="ui-g-12 ui-md-3 ui-lg-2" style="padding-top: 15px !important;">
                            <p:commandButton value="Cerca / Cambia Articolo"
                                             style="margin-right: 20px; border-radius: 5px;"
                                             id="cercaArticolo" class="pf-btn-confirm"
                                             action="#{templateView.currentView.cercaArticoloAction}"
                                             update="@(.cercaArticoloDialog) @(.updateableContent)"
                                             oncomplete="PF('cercaArticoloDialog').show()" />
                            <ui:include src="cercaArticoloDialog.xhtml" />
                        </div>
                        <div class="ui-g-12 ui-md-3 ui-lg-1">
                            <div>
                                <p:outputLabel for="codiceArticolo" value="Codice Articolo"
                                               class="input-field-label" />
                            </div>
                            <div>
                                <p:inputText id="codiceArticolo" styleClass="updateableContent" class="input-field"
                                             style="width: 100%; background-color: transparent;" readonly="true"
                                             value="#{templateView.currentView.codiceArticolo}" />
                            </div>
                        </div>
                        <div class="ui-g-12 ui-md-3 ui-lg-3">
                            <div>
                                <p:outputLabel for="descrizioneArticolo" value="Descrizione Articolo"
                                               class="input-field-label" />
                            </div>
                            <div>
                                <p:inputText id="descrizioneArticolo" styleClass="updateableContent" class="input-field"
                                             style="width: 100%; background-color: transparent;" readonly="true"
                                             value="#{templateView.currentView.descrizioneArticolo}" />
                            </div>
                        </div>
                        <div class="ui-g-12 ui-md-3 ui-lg-4"
                             style="padding-top: 15px !important; margin-left: 75px !important;">
                            <p:commandButton value="In corso / Futuri" style="margin-right: 20px; border-radius: 5px;"
                                             id="cercaInCorsoFuturi" class="pf-btn-confirm"
                                             action="#{templateView.currentView.cercaInCorsoFuturiAction}"
                                             disabled="#{templateView.currentView.searchButtonDisabled}"
                                             update="@(.updateablePanelContent)" />
                            <p:commandButton value="Completati" style="border-radius: 5px;"
                                             id="cercaCompletati" class="pf-btn-confirm"
                                             action="#{templateView.currentView.cercaCompletatiAction}"
                                             disabled="#{templateView.currentView.searchButtonDisabled}"
                                             update="@(.updateablePanelContent)" />
                        </div>
                    </div>

                    <p:panel id="expandable_db_grid_articoloInPromo" toggleable="true" toggleSpeed="500"
                             closeSpeed="500" styleClass="pnlGrid_Header updateablePanelContent">
                        <f:facet name="header">
                            <p:outputLabel
                                    value="Articolo presente nelle promozioni #{templateView.currentView.searchType}" />
                        </f:facet>
                        <h:panelGroup layout="block"
                                      style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham grid_articoloInPromo"
                                      pt:gridid="db_grid_articoloInPromo">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="articoloInPromoFilter"
                                         placeholder="Filtra..." styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_grid_articoloInPromo', this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_grid_articoloInPromo')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExport('db_grid_articoloInPromo', 'Riepilogo Promozioni', true)"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_grid_articoloInPromo', 'Riepilogo Promozioni')"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>
                        <script type="application/javascript">
                            function loadGridReportArticoliInPromo(searchType, idItem) {
                                var cercaArticoloGridParams = {
                                    gridCode: 'db_grid_articoloInPromo',
                                    gridTitle: 'Articolo in Promo',
                                    url_columnDefs: contextPath + '/resources/reportArticoloInPromo/columnDef',
                                    url_rowData: contextPath + '/resources/reportArticoloInPromo/rowData/'
                                        + idItem + '/' + searchType,
                                    url_customSort: contextPath + '/resources/grid/sorting/db_grid_articoloInPromo',
                                    gridOptions: {
                                        autoGroupColumnDef: {
                                            headerName: 'Promozione',
                                            width: 500,
                                            cellStyle: {fontWeight: 'bold'},
                                            field: 'descrizioneEstesa.value',
                                            cellRendererParams: {
                                                suppressCount: true
                                            }
                                        },
                                        onSortChanged: function (event) {
                                            onSortChanged(event, contextPath + '/resources/grid/sorting/save/db_grid_articoloInPromo');
                                        }
                                    }
                                };
                                creaGriglia(cercaArticoloGridParams);
                            }

                            function clearGridReportArticoliInPromo() {
                                var gridOptions = getGridOptionFromGridMap('db_grid_articoloInPromo');
                                if (gridOptions) {
                                    gridOptions.api.setRowData([]);
                                }
                            }
                        </script>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
    <style>
        .input-field {
            border-radius: 3px;
            border-color: gray;
        }

        .input-field-label {
            font-size: 14px;
            font-weight: 500;
            color: black;
        }
    </style>
</ui:composition>
</html>
