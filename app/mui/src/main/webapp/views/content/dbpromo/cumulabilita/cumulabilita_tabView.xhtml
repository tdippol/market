<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui" xmlns:c="http://java.sun.com/jsp/jstl/core">

<ui:composition>

    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet" style="background: #ececec;">
                    <h:form id="cumulabilitaForm" styleClass="updateableContent">
                        <style>
                            .input-field {
                                border-radius: 3px;
                                border-color: gray;
                            }

                            .input-field-label {
                                font-size: 14px;
                                font-weight: 500;
                                color: black;
                            }

                            .ui-tabs {
                                padding: 0;
                            }

                            .ui-tabs-nav {
                                background: #ececec !important;
                            }

                            .ui-tabs-panels {
                                border: 1px solid gray;
                                background: white;
                                border-radius: 3px;
                            }

                            .ui-tabs .ui-tabs-panel {
                                padding-top: 0px;
                                padding-bottom: 0px;
                            }

                            .ui-tabs.ui-tabs-top>.ui-tabs-nav li {
                                border-top-left-radius: 5px;
                                border-top-right-radius: 5px;
                            }
                        </style>
                    </h:form>

                    <p:tabView widgetVar="cumulabilita_tabs" styleClass="tabScheda" activeIndex="${templateView.currentView.activeIndex}">
                        <p:ajax event="tabChange" listener="#{templateView.currentView.tabChanged}" update = "@(.updateableContent)"/>
                        <p:tab title="Cumulabilità" styleClass="tabScheda">
                        </p:tab>
                        <p:tab title="Esclusività" styleClass="tabScheda">
                        </p:tab>
                    </p:tabView>


                    <p:panel styleClass="tabScheda">
                        <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
                            <div class="row">
                                <div class="col-12">
                                    <div id="k_grid_portletpromoGrid" class="k-portlet">
                                        <div class="row">
                                            <ui:include src="tabs/cumulabilita/grid_cumulabilita.xhtml" />
                                            <ui:include src="tabs/cumulabilita/grid_buoni.xhtml" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </p:panel>

                    <p:outputLabel value="#{templateView.currentView.removeIdBuono}"
                                   styleClass="remove_idBuono" style="visibility: hidden;"/>

                    <p:outputLabel value="#{templateView.currentView.idCumulabilitaSelected}"
                                   styleClass="idCumulabilitaSelected" style="visibility: hidden;" />

                    <p:outputLabel value="#{templateView.currentView.currentTab.value}"
                                   styleClass="updateableTabValue" style="visibility: hidden;" />
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
