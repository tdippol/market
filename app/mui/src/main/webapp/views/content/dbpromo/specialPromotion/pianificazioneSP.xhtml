<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:c="http://java.sun.com/jsp/jstl/core">

<ui:composition>

    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">

                <div id="k_grid_portletPianificazioneSP" class="k-portlet" style="background: #ececec;">

                    <h:form id="pianificazioneForm" styleClass="updateableContent">

                        <div class="ui-g-12" style="padding: 10px;">
                            <div class="ui-g-12 ui-md-6 ui-lg-4">
                                <div>
                                    <p:outputLabel for="promotions" value="Promozione" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:selectOneMenu id="promotions"
                                                     value="#{templateView.currentView.idSpecialPromotionCorrente}"
                                                     class="input-field"
                                                     disabled="false"
                                                     filter="true"
                                                     filterMatchMode="contains"
                                                     style="width: 100%; background-color: white;">

                                        <p:ajax update="@(.updateableContent) @(.tabScheda)"/>

                                        <f:selectItems value="#{templateView.currentView.specialPromotions}"
                                                       var="sp"
                                                       itemLabel="#{sp.descrizioneEstesa}"
                                                       itemValue="#{sp.id}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-1">
                                <div>
                                    <p:outputLabel for="codice" value="Codice" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="codice"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.codicePromozione : ''}"/>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-3">
                                <div>
                                    <p:outputLabel for="descrizione" value="Descrizione" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="descrizione"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.descrizione : ''}"/>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-2">
                                <div>
                                    <p:outputLabel for="gruppo" value="Gruppo" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="gruppo"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.canalePromozioneEntity.gruppoPromozioneEntity.descrizione : ''}"/>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-2">
                                <div>
                                    <p:outputLabel for="canale" value="Tipo Promozione" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="canale"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.canalePromozioneEntity.descrizione : ''}"/>
                                </div>
                            </div>
                        </div>

                        <div class="ui-g-12" style="padding: 10px;">
                            <div class="ui-g-12 ui-md-6 ui-lg-1">
                                <div>
                                    <p:outputLabel for="anno" value="Anno" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="anno"
                                                 readonly="true"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.anno : ''}"/>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-1">
                                <div>
                                    <p:outputLabel for="dataInizio" value="Data inizio" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="dataInizio"
                                                 class="input-field"
                                                 style="text-transform: capitalize; width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.dataInizio : ''}">
                                        <f:convertDateTime pattern="E dd-MM-yyyy" locale="it_IT"/>
                                    </p:inputText>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-1">
                                <div>
                                    <p:outputLabel for="dataFine" value="Data fine" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="dataFine"
                                                 class="input-field"
                                                 style="text-transform: capitalize; width: 100%; background-color: transparent;"
                                                 readonly="true"
                                                 value="#{templateView.currentView.specialPromotionSelected != null ? templateView.currentView.specialPromotionSelected.dataFine : ''}">
                                        <f:convertDateTime pattern="E dd-MM-yyyy" locale="it_IT"/>
                                    </p:inputText>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-2">
                                <div>
                                    <p:outputLabel for="stato" value="Stato" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="stato"
                                                 readonly="true"
                                                 class="input-field"
                                                 style="width: 100%; background-color: transparent;"
                                                 value="#{templateView.currentView.statoCorrente != null ? templateView.currentView.statoCorrente.statoPromozioneEntity.codiceStato : ''} #{templateView.currentView.statoCorrente != null ? '-' : ''} #{templateView.currentView.statoCorrente != null ? templateView.currentView.statoCorrente.statoPromozioneEntity.label : ''}"/>
                                </div>
                            </div>

                            <div class="ui-g-12 ui-md-6 ui-lg-1">
                                <div>
                                    <p:outputLabel for="dataInizioStato" value="Data inizio stato" class="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputText id="dataInizioStato"
                                                 readonly="true"
                                                 class="input-field"
                                                 style="text-transform: capitalize; width: 100%; background-color: transparent;"
                                                 value="#{templateView.currentView.statoCorrente != null ? templateView.currentView.statoCorrente.dataInizioStato : ''}">
                                        <f:convertDateTime pattern="E dd-MM-yyyy" locale="it_IT"/>
                                    </p:inputText>
                                </div>
                            </div>
                        </div>

                        <style>
                            .input-field {
                                border-radius: 3px;
                                border-color: gray;
                            }

                            .input-field-label {
                                font-size: 14px;
                                font-weight: 500;
                                color: black;
                            }

                            .ui-tabs {
                                padding: 0;
                            }

                            .ui-tabs-nav {
                                background: #ececec !important;
                            }

                            .ui-tabs-panels {
                                border: 1px solid gray;
                                background: white;
                                border-radius: 3px;
                            }

                            .ui-tabs .ui-tabs-panel {
                                padding-top: 0px;
                                padding-bottom: 0px;
                            }

                            .ui-tabs.ui-tabs-top > .ui-tabs-nav li {
                                border-top-left-radius: 5px;
                                border-top-right-radius: 5px;
                            }

                            .ui-icon-carat-1-s {
                                transform: rotate(180deg) !important;
                            }
                        </style>

                    </h:form>

                    <script>
                        var currentActiveTab = #{templateView.currentView.activeTab};

                        function setPianificazioneCurrentTab(index){
                            flushSpParamEditing();
                            currentActiveTab = index;
                        }
                    </script>

                    <p:tabView dynamic="true"
                               cache="false"
                               onTabShow="setPianificazioneCurrentTab(index)"
                               widgetVar="pianificazioneSP_tabs"
                               styleClass="tabScheda"
                               activeIndex="#{templateView.currentView.activeTab}">

                        <p:ajax event="tabChange"
                                listener="#{templateView.currentView.onTabChange}"/>

                        <c:forEach items="#{templateView.currentView.renderedTabItems}" var="tab" varStatus="loop">
                            <p:tab title="#{tab.title}">
                                <f:subview id="tab_#{loop.index}">
                                    <ui:include src="#{tab.content}"/>
                                </f:subview>
                            </p:tab>
                        </c:forEach>

                    </p:tabView>

                </div>

            </div>
        </div>
    </div>

</ui:composition>

</html>
