<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
>

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <div class="row">
                        <div class="col-3">
                            <h:form>
                                <p:dataTable var="s" styleClass="pf-datatable supportiMediaAssociati"
                                             widgetVar="supportiMediaAssociati" selectionMode="single"
                                             value="#{templateView.currentView.supportiMediaConfiguratiBean.supportiMedia}"
                                             rowKey="#{s.id}" rowIndexVar="rowIndex"
                                             selection="#{templateView.currentView.supportiMediaConfiguratiBean.supportoMediaSelezionato}">
                                    <p:column headerText="Codice" width="20%">
                                        <h:outputText value="#{s.codiceMedia}" />
                                    </p:column>
                                    <p:column headerText="Descrizione" width="80%">
                                        <h:outputText value="#{s.descrizione}" />
                                    </p:column>
                                    <p:ajax event="rowSelect" update="@(.controlliTable) @(.supportiMediaAssociati)" />
                                </p:dataTable>
                            </h:form>
                        </div>
                        <div class="col-9">
                            <h:form>
                                <p:dataTable var="c" styleClass="pf-datatable controlliTable"
                                             widgetVar="controlliTable" style="width: 100%;"
                                             value="#{templateView.currentView.supportiMediaConfiguratiBean.controlliConfigurati}"
                                             rowKey="#{c.checkEnum.codice}" rowIndexVar="rowIndex">
                                    <p:column headerText="Attivo" width="20%" style="text-align: center;">
                                        <p:selectBooleanCheckbox value="#{c.abilitato}">
                                            <p:ajax event="valueChange"
                                                    update="@(.controlliTable) @(.supportiMediaAssociati)"
                                                    listener="#{templateView.currentView.supportiMediaConfiguratiBean.attivaControllo(c)}" />
                                        </p:selectBooleanCheckbox>
                                    </p:column>
                                    <p:column headerText="Controllo">
                                        <h:outputText value="#{c.checkEnum.codice} - #{c.checkEnum.descrizione}" />
                                    </p:column>
                                </p:dataTable>
                            </h:form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
