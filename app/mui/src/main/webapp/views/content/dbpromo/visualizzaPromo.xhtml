<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
>

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <p:panel id="expandable_db_grid_visualizzaPromo" toggleable="true" toggleSpeed="500" closeSpeed="500" styleClass="pnlGrid_Header updateableContent">
                        <f:facet name="header">
                            <p:outputLabel value="Riepilogo Promozioni"/>
                        </f:facet>
                        <h:panelGroup layout="block"
                                      style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham grid_visualizzaPromo"
                                      pt:gridid="db_grid_visualizzaPromo">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="some_grid_id_from_backend_quickfilter" placeholder="Filtra..." styleClass="pnlGrid_Header filterInputText" onkeyup="onFilterTextBoxChangedpromoGrid('db_grid_visualizzaPromo',this.value)"/>
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton" onclick="expandGrid('db_grid_visualizzaPromo')" onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti" styleClass="pnlGrid_Header exportButtonGrouped" onclick="onBtExport('db_grid_visualizzaPromo','Riepilogo Promozioni',true)" onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton" onclick="onBtExport('db_grid_visualizzaPromo','Riepilogo Promozioni')" onerror="redirectToExpiredPage()" />
                        </f:facet>


                        <script>
                            
					var gridParams={
                        gridCode:'db_grid_visualizzaPromo',
                        gridTitle:'Visualizza Promo',
                        url_columnDefs:contextPath+'/resources/grid/columnDef/visualizza' + addUrlParamContesto(#{muiContext}),
                        url_rowData:contextPath+'/resources/grid/rowData/visualizza'+addUrlParamContesto(#{muiContext}),
                        url_customSort: contextPath + '/resources/grid/sorting/db_grid_visualizzaPromo'
					};
			
					var gridOptions={
						autoGroupColumnDef: {
							headerName: ' Promozione ',
							width: 500,
							cellStyle:{fontWeight:'bold'},
							field: 'descrizioneEstesa.value',
							cellRendererParams: {
								suppressCount : true
							}
						},
						onCellDoubleClicked: openSchedaPromo,
                        onSortChanged: function (event) {
                            onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams.gridCode);
                        }
			        };

			        gridParams.gridOptions=gridOptions;

			        $( document ).ready(function() {
			        	creaGriglia(gridParams);
			        });

				   function openSchedaPromo(param) {
						linkButton_scheda([{name:'menuId', value:#{templateView.currentView.landingPage}},
						{name:'currentPromoId', value: param.data.id.value}]);
                    }

					</script>

                        <p:remoteCommand name="linkButton_scheda" action="#{templateView.simulateMenuClick()}" />

                        <style>
                        </style>
                    </p:panel>

                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
