<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
>

<ui:composition>
    <ui:include src="../dialogs/dlgAddSupporto.xhtml" />

    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <p:commandButton value="Aggiungi" class="pf-btn-confirm" id="addSupporto"
                                 action="#{templateView.currentView.prepareDialogAddSupporto}"
                                 update="@(.dlgAddSupportoClass)"
                                 oncomplete="PF('dlgAddSupporto').show()" />
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <p:panel id="expandable_db_pianoMediaSupporti" toggleable="true"
                             toggleSpeed="500" closeSpeed="500"
                             styleClass="pnlGrid_Header updateableSupporti expandable_db_pianoMediaSupporti">
                        <f:facet name="header">
                            <p:outputLabel value="Gestione Anagrafiche" />
                        </f:facet>
                        <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham pianoMediaSupporti"
                                      pt:gridid="db_pianoMediaSupporti">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="pianoMediaSupporti_quickfilter"
                                         placeholder="Filtra..."
                                         styleClass="pnlGrid_Header filterInputText pianoMediaSupportiFilter"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_pianoMediaSupporti', this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_pianoMediaSupporti')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExport('db_pianoMediaSupporti', 'Anagrafiche Piano Media', true)"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_pianoMediaSupporti', 'Anagrafiche Piano Media', false)"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>
                        <script type="text/javascript">
                            var gridParams_pianoMediaSupporti = {
                                gridTabGroup: 'pianoMediaAmministrazione_tabs',
                                gridTabPosition: 0,
                                gridCode: 'db_pianoMediaSupporti',
                                gridTitle: 'Piano Media - Tab Gestione Anagrafiche',
                                url_columnDefs: contextPath + '/resources/pianomedia/supporti/columnDef'
                                    + addUrlParamContesto(#{muiContext}),
                                url_rowData: contextPath + '/resources/pianomedia/supporti/rowData'
                                    + addUrlParamContesto(#{muiContext}),
                                url_customSort: contextPath + '/resources/grid/sorting/db_pianoMediaSupporti'
                            };
                            var gridOptions_pianoMediaSupporti = {
                                onSortChanged: function (event) {
                                    onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_pianoMediaSupporti.gridCode);
                                },
                                onCellValueChanged: function (event) {
                                    var rowIndex = getRowNodeId(event);
                                    var rowData = getRowData('db_pianoMediaSupporti');
                                    var payload = {
                                        descrizione: rowData[rowIndex].descrizione.value,
                                        attivo: rowData[rowIndex].attivo.value,
                                        colore: rowData[rowIndex].colore
                                    };
                                    var id = rowData[rowIndex].id.value;
                                    $.ajax({
                                        type: "POST",
                                        url: contextPath + "/resources/pianomedia/supporti/" + id + addUrlParamContesto(#{muiContext}),
                                        contentType: "application/json",
                                        data: JSON.stringify(payload),
                                        success: function (data) {
                                            rowData[rowIndex] = data.rowData[0];
                                            getGridOptionFromGridMap('db_pianoMediaSupporti').api.setRowData(rowData);
                                            var updateMessage = data.updateMessage;
                                            if (updateMessage) {
                                                addInfoGrowl([
                                                    {name: 'title', value: ''},
                                                    {name: 'message', value: updateMessage}
                                                ]);
                                            }
                                        },
                                        error: function (jqXHR, exception, thrownError) {
                                            reloadGrid();
                                            ajaxErrorHandler(jqXHR, exception, thrownError, event);
                                        }
                                    })
                                }
                            };
                            gridParams_pianoMediaSupporti.gridOptions = gridOptions_pianoMediaSupporti;

                            function reloadGrid() {
                                $.ajax({
                                    type: "GET",
                                    url: gridParams_pianoMediaSupporti.url_rowData,
                                    contentType: "application/json",
                                    success: function (data) {
                                        getGridOptionFromGridMap("db_pianoMediaSupporti").api.setRowData(data.rowData);
                                        getGridOptionFromGridMap("db_pianoMediaSupporti").api.refreshCells();
                                    },
                                    error: ajaxErrorHandler
                                })
                            }

                            $(document).ready(function () {
                                creaGriglia(gridParams_pianoMediaSupporti);
                            });
                        </script>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
