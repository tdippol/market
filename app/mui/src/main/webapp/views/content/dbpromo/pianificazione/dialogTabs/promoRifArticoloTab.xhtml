<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content"
         style="margin-bottom: 0 !important; padding-bottom: 0 !important;">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <h:form>
                        <p:panel id="expandable_promorif_dialog_inserisci_selezione"
                                 toggleable="true" toggleSpeed="500" closeSpeed="500"
                                 styleClass="pnlGrid_Header expandable_promorif_dialog_inserisci_selezione"
                                 style="text-align: center;">
                            <f:facet name="header">
                                <p:outputLabel value="Selezione Articoli" />
                            </f:facet>

                            <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                          class="ag-theme-balham selezioneTab"
                                          pt:gridid="promorif_dialog_inserisci_selezione">
                            </h:panelGroup>

                            <f:facet name="actions">
                                <p:inputText autocomplete="off" id="selezioneTabPromoRif_quickfilter" placeholder="Filtra..."
                                             styleClass="pnlGrid_Header filterInputText"
                                             onkeyup="onFilterTextBoxChangedpromoGrid('promorif_dialog_inserisci_selezione',this.value)"/>
                                <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                               onclick="expandGrid('promorif_dialog_inserisci_selezione')"
                                               onerror="redirectToExpiredPage()"/>
                                <p:commandLink title="Esporta con raggruppamenti"
                                               styleClass="pnlGrid_Header exportButtonGrouped"
                                               onclick="onBtExport('promorif_dialog_inserisci_selezione','Export',true)"
                                               onerror="redirectToExpiredPage()"/>
                                <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                               onclick="onBtExport('promorif_dialog_inserisci_selezione','some title from backend')"
                                               onerror="redirectToExpiredPage()"/>
                            </f:facet>

                            <script type="text/javascript">
                                function loadArticoloGrid(promoId, codicePromoRiferimento) {
                                    var gruppoSelezionato = $('.codiceGruppoSelezionato').text();
                                    if (gruppoSelezionato) {
                                        gruppoSelezionato = '/'+gruppoSelezionato;
                                    }
                                    var gridParams_promorif_dialog_inserisci_articoli = {
                                        gridId: 'db_promorif_dialog_inserisci_selezione',
                                        gridTabGroup: 'promorif_dialog_inserisci_selezione_tabs',
                                        gridTabPosition: 0,
                                        gridCode: 'promorif_dialog_inserisci_selezione',
                                        gridTitle: 'Pianificazione - Dialog Inserisci da Promozione Riferimento - Selezione',
                                        url_columnDefs: contextPath + '/resources/pianificazionepromo/promoriferimento/articoli/columnDef'
                                            + addUrlParamContesto(#{muiContext}),
                                        url_rowData: contextPath + '/resources/pianificazionepromo/promoriferimento/articoli/rowData/'
                                            + promoId + '/' + codicePromoRiferimento + gruppoSelezionato +  addUrlParamContesto(#{muiContext}),
                                        url_customSort: contextPath + '/resources/grid/sorting/promorif_dialog_inserisci_selezione'
                                    };
                                    var gridOptions_promorif_dialog_inserisci_articoli = {
                                        rowSelection: 'multiple',
                                        suppressRowClickSelection: true,
                                        onSelectionChanged: onPromoRifItemRowSelected,
                                        onSortChanged: function (event) {
                                            onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_promorif_dialog_inserisci_articoli.gridCode);
                                        }
                                    };
                                    gridParams_promorif_dialog_inserisci_articoli.sortColumnDefs = [
                                        { columnDefId: 'selected', newPosition: 0 }
                                    ];
                                    gridParams_promorif_dialog_inserisci_articoli.customizeColumnDefs = [
                                        { columnDefId: 'selected', property: 'editable', value: false }
                                    ];
                                    gridParams_promorif_dialog_inserisci_articoli.gridOptions = gridOptions_promorif_dialog_inserisci_articoli;
                                    if (getCurrentTab(gridParams_promorif_dialog_inserisci_articoli.gridTabGroup)
                                            === gridParams_promorif_dialog_inserisci_articoli.gridTabPosition) {
                                        creaGriglia(gridParams_promorif_dialog_inserisci_articoli);
                                    }
                                }

                                function onPromoRifItemRowSelected(event) {
                                    var obj = [];
                                    $.each(event.api.getSelectedNodes(), function (key, value) {
                                        obj.push({
                                            codicePromozione: value.data.codicePromozione.value,
                                            idItem: value.data.codiceItem.value,
                                            tipoItem: value.data.tipoItem.value,
                                            meccanica: value.data.meccanica.value,
                                            codiceItem: value.data.codiceArticolo.value,
                                            descrizioneItem: value.data.descrizioneArticolo.value,
                                            offerta: value.data.offerta.value
                                        });
                                    });
                                    selezionaPromoRifItem([{ name: 'itemSelected', value: JSON.stringify(obj) }]);
                                }
                            </script>
                        </p:panel>
                        <p:remoteCommand name="selezionaPromoRifItem" update="confirmPromoRiferimentoDialogBtn"
                                         action="#{templateView.currentView.promoRiferimentoBean.selezionaItems}" />
                    </h:form>
                    <p:outputLabel
                            value="#{templateView.currentView.promoRiferimentoBean.gruppoSelezionato}"
                            class="codiceGruppoSelezionato" style="visibility: hidden;" />

                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
