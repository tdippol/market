<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>

    <ui:include src="/views/content/dbpromo/specialPromotion/specialPromotionDialog.xhtml"/>

    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">

        <div class="row">
            <div class="col-12">
                <h:form id="createSpecialPromotionForm">
                    <p:commandButton
                            id="addSpecialPromotion"
                            value="Crea Promozione"
                            class="pf-btn-confirm"
                            process="@this"
                            action="#{templateView.currentView.openCreateDialog}"
                            oncomplete="PF('specialPromotionDialog').show()"/>
                </h:form>
            </div>
        </div>

        <div class="row">
            <div class="col-12">

                <div id="k_grid_portletpromoGrid" class="k-portlet">

                    <p:panel id="expandable_db_grid_visualizzaSpecialPromotion"
                             toggleable="true"
                             toggleSpeed="500"
                             closeSpeed="500"
                             styleClass="pnlGrid_Header updateableContent">

                        <f:facet name="header">
                            <p:outputLabel value="Riepilogo Promozioni"/>
                        </f:facet>

                        <h:panelGroup layout="block"
                                      style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham grid_visualizzaSpecialPromotion"
                                      pt:gridid="db_grid_visualizzaSpecialPromotion"/>

                        <f:facet name="actions">

                            <p:inputText
                                    id="specialPromotionQuickFilter"
                                    autocomplete="off"
                                    placeholder="Filtra..."
                                    styleClass="pnlGrid_Header filterInputText"
                                    onkeyup="onFilterTextBoxChangedpromoGrid('db_grid_visualizzaSpecialPromotion',this.value)"/>

                            <p:commandLink
                                    title="Espandi Griglia"
                                    styleClass="pnlGrid_Header expandButton"
                                    onclick="expandGrid('db_grid_visualizzaSpecialPromotion')"
                                    onerror="redirectToExpiredPage()"/>

                            <p:commandLink
                                    title="Esporta con raggruppamenti"
                                    styleClass="pnlGrid_Header exportButtonGrouped"
                                    onclick="onBtExport('db_grid_visualizzaSpecialPromotion','Riepilogo Special Promotion',true)"
                                    onerror="redirectToExpiredPage()"/>

                            <p:commandLink
                                    title="Esporta Excel"
                                    styleClass="pnlGrid_Header exportButton"
                                    onclick="onBtExport('db_grid_visualizzaSpecialPromotion','Riepilogo Special Promotion')"
                                    onerror="redirectToExpiredPage()"/>

                        </f:facet>

                        <script>
                            var gridParams = {
                                gridCode: 'db_grid_visualizzaSpecialPromotion',
                                gridTitle: 'Visualizza Special Promotion',
                                url_columnDefs: contextPath + '/resources/specialpromotion/visualizza/columnDef' + addUrlParamContesto(#{templateView.currentView.contesto}),
                                url_rowData: contextPath + '/resources/specialpromotion/visualizza/rowData' + addUrlParamContesto(#{templateView.currentView.contesto}),
                                url_customSort: contextPath + '/resources/grid/sorting/db_grid_visualizzaSpecialPromotion'
                            };

                            var gridOptions = {
                                onGridReady: function (params) {
                                    params.api.sizeColumnsToFit();
                                },
                                onFirstDataRendered: function (params) {
                                    params.api.sizeColumnsToFit();
                                },
                                onSortChanged: function (event) {
                                    onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams.gridCode);
                                }
                            };

                            gridParams.gridOptions = gridOptions;

                            $(document).ready(function () {
                                creaGriglia(gridParams);
                            });

                            function reloadVisualizzaSpecialPromotionGrid() {
                                var opts = getGridOptionFromGridMap('db_grid_visualizzaSpecialPromotion');
                                if (opts) {
                                    opts.api.destroy();
                                }
                                creaGriglia(gridParams);
                            }

                            function openSchedaSpecialPromotionAfterCreate(promoId, landingPage) {
                                linkButton_scheda([
                                    {name:'menuId', value: landingPage},
                                    {name:'currentPromoId', value: promoId}
                                ]);
                            }


                            function showGlobalLoader() {
                            var overlay = document.getElementById('globalLoadingOverlay');
                            if (overlay) {
                                overlay.style.display = 'block';
                            }
                        }
                        </script>

                        <p:remoteCommand name="linkButton_scheda" action="#{templateView.simulateMenuClick()}" />

                    </p:panel>

                </div>

            </div>
        </div>

    </div>

    <div id="globalLoadingOverlay"
         style="display:none;
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                backdrop-filter: blur(4px);
                background: rgba(0,0,0,0.2);
                z-index:9999;">
        <div style="position:absolute;
                    top:50%;
                    left:50%;
                    transform:translate(-50%, -50%);
                    color:white;
                    font-size:18px;">
            Caricamento...
        </div>
    </div>
</ui:composition>
</html>
