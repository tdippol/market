<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <p:panel id="expandable_db_pianificazione_controlli" toggleable="true" toggleSpeed="500" closeSpeed="500"
                             styleClass="pnlGrid_Header updateableContent expandable_db_pianificazione_controlli">
                        <f:facet name="header">
                            <p:outputLabel value="Storico Controlli" />
                        </f:facet>

                        <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham pianificazione_controlli"
                                      pt:gridid="db_pianificazione_controlli">
                        </h:panelGroup>

                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="pianificazione_controlli_quickfilter" placeholder="Filtra..."
                                         styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_pianificazione_controlli', this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_pianificazione_controlli')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_pianificazione_controlli','some title from backend')"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>

                        <script type="text/javascript">
						var currentPromoId = #{ templateView.currentView.idPromozioneCorrente };
                        var gridParams_pianificazioneControlli = {
                            gridTabGroup: 'schedaPianificazione_tabs',
                            gridTabPosition: #{templateView.currentView.indexOf('TAB_CONTROLLI_PIANIFICAZIONE')},
                            gridCode: 'db_pianificazione_controlli',
                            gridTitle: 'Pianificazione - Controlli',
                            url_columnDefs: contextPath + '/resources/pianificazionepromo/planning/controlli/columnDef' + addUrlParamContesto(#{muiContext}),
                            url_rowData: contextPath + '/resources/pianificazionepromo/planning/controlli/rowData/' + currentPromoId,
                            url_customSort: contextPath + '/resources/grid/sorting/db_pianificazione_controlli'
                        };
                        var gridOptions = {
                            onSortChanged: function (event) {
                                onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_pianificazioneControlli.gridCode);
                            }
                        };
                        gridParams_pianificazioneControlli.gridOptions = gridOptions;
                		
                        $(document).ready(function() {
                        	if(getCurrentTab(gridParams_pianificazioneControlli.gridTabGroup) === gridParams_pianificazioneControlli.gridTabPosition) {
    							creaGriglia(gridParams_pianificazioneControlli);
            	        	}
                        });
                        </script>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
