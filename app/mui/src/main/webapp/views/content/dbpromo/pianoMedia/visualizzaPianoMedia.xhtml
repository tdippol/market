<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
>

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <p:panel id="expandable_db_grid_visualizzaPianoMedia" toggleable="true" toggleSpeed="500"
                             closeSpeed="500" styleClass="pnlGrid_Header updateableContent">
                        <f:facet name="header">
                            <p:outputLabel value="Riepilogo Piani Media" />
                        </f:facet>

                        <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                      styleClass="ag-theme-balham gridVisualizzaPianoMedia"
                                      pt:gridid="db_grid_visualizzaPianoMedia">
                        </h:panelGroup>

                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="db_grid_visualizzaPianoMedia_quickfilter"
                                         placeholder="Filtra..." styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_grid_visualizzaPianoMedia', this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_grid_visualizzaPianoMedia')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExport('db_grid_visualizzaPianoMedia', 'Riepilogo Piani Media', true)"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_grid_visualizzaPianoMedia', 'Riepilogo Piani Media')"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>

                        <script>
                            var gridParams_visualizzaPianoMedia = {
                                gridCode: 'db_grid_visualizzaPianoMedia',
                                gridTitle: 'Visualizza Piani Media',
                                url_columnDefs: contextPath + '/resources/pianomedia/visualizza/columnDef'
                                    + addUrlParamContesto(#{muiContext}),
                                url_rowData: contextPath + '/resources/pianomedia/visualizza/rowData'
                                    + addUrlParamContesto(#{muiContext}),
                                url_customSort: contextPath + '/resources/grid/sorting/db_grid_visualizzaPianoMedia'
                            };
                            var gridOptions_visualizzaPianoMedia = {
                                autoGroupColumnDef: {
                                    headerName: 'Descrizione',
                                    width: 500,
                                    cellStyle: {fontWeight: 'bold'},
                                    field: 'descrizione.value',
                                    cellRendererParams: {suppressCount: true}
                                },
                                onCellDoubleClicked: openSchedaPianoMedia,
                                onSortChanged: function (event) {
                                    onSortChanged(event, contextPath
                                        + '/resources/grid/sorting/save/'
                                        + gridParams_visualizzaPianoMedia.gridCode)
                                }
                            };
                            gridParams_visualizzaPianoMedia.gridOptions = gridOptions_visualizzaPianoMedia;

                            $(document).ready(function () {
                                creaGriglia(gridParams_visualizzaPianoMedia);
                            });

                            function openSchedaPianoMedia(param) {
                                linkButtonSchedaPianoMedia([
                                    { name:'menuId', value: #{templateView.currentView.landingPage} },
                                    { name:'currentPianoMediaId', value: param.data.id.value }
                                ]);
                            }
                        </script>
                        <p:remoteCommand name="linkButtonSchedaPianoMedia"
                                         action="#{templateView.simulateMenuClick()}" />
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
</html>
