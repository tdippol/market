<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <p:confirmDialog widgetVar="updateCellConfirmDlg" header="Conferma Modifica" severity="alert">
                        <p:commandButton value="SI" type="button" onclick="confirmUpdateCell()" style="float: right;" />
                        <p:commandButton value="NO" type="button" onclick="discardUpdateCell()" style="float: left;" />
                    </p:confirmDialog>

                    <p:panel id="expandable_db_schedapromo_attributi" toggleable="true" toggleSpeed="500" closeSpeed="500"
                             styleClass="pnlGrid_Header updateableContent expandable_db_schedapromo_attributi">
                        <f:facet name="header">
                            <p:outputLabel value="" />
                        </f:facet>

                        <h:panelGroup 
                        	layout="block" 
                        	style="height: 60vh; width: 100%;"
							class="ag-theme-balham attributi"
							pt:gridid="db_schedapromo_attributi">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="flag_quickfilter" placeholder="Filtra..."
                                         styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_schedapromo_attributi', this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_schedapromo_attributi')" onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExportGrouped('db_schedapromo_attributi', 'Scheda Promo - Attributi')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_schedapromo_attributi', 'Scheda Promo - Attributi')"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>

                        <h:form>
                            <p:remoteCommand name="onValidateAttributoPreUpdate"
                                             action="#{templateView.currentView.validateAttributoPreUpdate}"
                                             oncomplete="handleValidateAttributoPreUpdate(xhr, status, args)"/>
                        </h:form>

                        <script type="text/javascript">
                        var pendingEditParams = null;

                		var gridParams_schedaPromoAttributi = {
                            gridId: 'attributi',
                            gridTabGroup: 'schedaPromo_tabs',
                            gridTabPosition: #{templateView.currentView.indexOf('TAB_ATTRIBUTI')},
                            gridCode: 'db_schedapromo_attributi',
                            gridTitle: 'SchedaPromo - Attributi',
                            url_columnDefs: contextPath + '/resources/grid/schedapromo/attributi/columnDef'
                                + addUrlParamContesto(#{muiContext}),
                            url_rowData: contextPath + '/resources/grid/schedapromo/attributi/rowData/'
                                + #{templateView.currentView.idPromozioneCorrente}
                                + addUrlParamContesto(#{muiContext}),
                            url_customSort: contextPath + '/resources/grid/sorting/db_schedapromo_attributi'
                        };
                        var options_schedaPromoAttributi = {
                            onCellValueChanged: function(event) {
                                updateCellAttributi(event)
                            },
                            onSortChanged: function (event) {
                                onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_schedaPromoAttributi.gridCode);
                            }
                        };
                        gridParams_schedaPromoAttributi.gridOptions = options_schedaPromoAttributi;

                        function callUpdateWs(rowIndex, rowData, idAttributo, valoreAttributo) {
                            let gridCode = 'db_schedapromo_attributi';
                            let url = contextPath + '/resources/grid/schedapromo/attributi/update/'
                                + #{templateView.currentView.idPromozioneCorrente}
                            + addUrlParamContesto(#{muiContext});
                            var payload = {
                                idAttributo: idAttributo,
                                valoreAttributo: valoreAttributo
                            }
                            $.ajax({
                                type: "POST",
                                url: url,
                                contentType: "application/json",
                                data: JSON.stringify(payload),
                                success: function (data) {
                                    rowData[rowIndex] = data;
                                    getGridOptionFromGridMap(gridCode).api.setRowData(rowData);
                                    addInfoGrowl([
                                        { name: 'title', value: 'Modifica attributo' },
                                        { name: 'message',value: data.callbackMessage }
                                    ]);
                                    // reload testata
                                },
                                error: function(jqXHR, exception, thrownError) {
                                    ajaxErrorHandler(jqXHR, exception, thrownError, event);
                                }
                            });
                        }

                        function updateCellAttributi(event) {
                            let gridCode = 'db_schedapromo_attributi';
                            var rowIndex = getRowNodeId(event);
                            var rowData = getRowData(gridCode);
                            var singleRow = rowData[rowIndex];
                            let idAttributo = singleRow.id.value;
                            let nomeAttributo = singleRow.attributo.value;
                            let valoreAttributo = singleRow.valore.value;
                            if (checkForSponsor(event.data)) {
                                pendingEditParams = {
                                    payload: {
                                        idAttributo: idAttributo,
                                        valoreAttributo: valoreAttributo
                                    },
                                    rowIndex: rowIndex,
                                    rowData: rowData,
                                    oldValue: event.oldValue
                                }
                                onValidateAttributoPreUpdate([
                                    {name: 'idAttributo', value: idAttributo},
                                    {name: 'nomeAttributo', value: nomeAttributo},
                                    {name: 'valoreAttributo', value: valoreAttributo}
                                ]);
                            } else {
                                callUpdateWs(rowIndex, rowData, idAttributo, valoreAttributo);
                            }
                        }

                        function checkForSponsor(data) {
                            return data &amp;&amp; data.attributo.value === 'NUMERO_SPONSOR';
                        }

                        function handleValidateAttributoPreUpdate(xhr, status, args) {
                            if (args) {
                                if (args.showError) {
                                    addErrorGrowl([
                                        {name: 'title', value: 'Attenzione'},
                                        {
                                            name: 'message',
                                            value: 'Errore durante la validazione dell\'attributo; contattare l\'assistenza tecnica'
                                        }
                                    ]);
                                } else if (args.showConfirmDialog) {
                                    let message = args.handleSponsorMessage ? args.handleSponsorMessage : 'Sei sicuro di voler modificare questo valore?';
                                    PF('updateCellConfirmDlg').jq.find('.ui-confirm-dialog-message').html(message);
                                    PF('updateCellConfirmDlg').show();
                                } else {
                                    let rowIndex = pendingEditParams.rowIndex;
                                    let rowData = pendingEditParams.rowData;
                                    let idAttributo = pendingEditParams.payload.idAttributo;
                                    let valoreAttributo = pendingEditParams.payload.valoreAttributo;
                                    callUpdateWs(rowIndex, rowData, idAttributo, valoreAttributo);
                                }
                            } else {
                                addErrorGrowl([
                                    { name: 'title', value: 'Attenzione' },
                                    { name: 'message', value: 'Errore durante la validazione dell\'attributo; contattare l\'assistenza tecnica' }
                                ]);
                            }
                        }

                        function confirmUpdateCell() {
                            PF('updateCellConfirmDlg').hide();
                            if (pendingEditParams) {
                                callUpdateWs(pendingEditParams.rowIndex, pendingEditParams.rowData, pendingEditParams.payload.idAttributo, pendingEditParams.payload.valoreAttributo);
                                pendingEditParams = null;
                            } else {
                                addErrorGrowl([
                                    {name: 'title', value: 'Errore'},
                                    {name: 'message', value: 'Impossibile eseguire aggiornamento'}
                                ]);
                            }
                        }

                        function discardUpdateCell() {
                            PF('updateCellConfirmDlg').hide();
                            if (pendingEditParams &amp;&amp; pendingEditParams.oldValue) {
                                let gridCode = 'db_schedapromo_attributi';
                                pendingEditParams.rowData[pendingEditParams.rowIndex].valore.value = pendingEditParams.oldValue;
                                getGridOptionFromGridMap(gridCode).api.setRowData(pendingEditParams.rowData);
                                pendingEditParams = null;
                            } else {
                                addErrorGrowl([
                                    {name: 'title', value: 'Errore'},
                                    {name: 'message', value: 'Impossibile eseguire aggiornamento'}
                                ]);
                            }
                        }

                        $(document).ready(function() {
                            if(currentActiveTab == gridParams_schedaPromoAttributi.gridTabPosition) {
                                creaGriglia(gridParams_schedaPromoAttributi);
                            }
                        });
                        </script>

                        <style>
                            .ag-header-cell {
                                background-color: inherit !important;
                            }

                            body .splitButtonStyle .ui-button {
                                background-color: #178b68 !important;
                                color: #ffffff;
                            }

                            body .splitButtonStyle .ui-button.ui-state-hover {
                                background-color: #178b68 !important;
                            }

                            body .splitButtonStyle .ui-button.ui-state-focus {
                                background-color: #178b68 !important;
                                outline: 0 none;
                            }

                            .menuItemStyle {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a:hover {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .ui-dialog-title {
                                font-size: 18px;
                            }
                        </style>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
