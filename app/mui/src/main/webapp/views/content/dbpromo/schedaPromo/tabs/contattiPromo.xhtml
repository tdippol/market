<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
>
<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <!-- Confirm dialog for save -->
                    <p:confirmDialog widgetVar="saveContattiConfirmDlg" header="Conferma"
                                     message="Salvare le modifiche?" severity="alert">
                        <p:commandButton value="Si" styleClass="pf-btn-confirm"
                                         action="#{templateView.currentView.contattiBean.saveContatti}"
                                         update="@(.updatableContatti) @(.updateableContent) @(.tabScheda)"
                                         style="float: right;"
                                         oncomplete="PF('saveContattiConfirmDlg').hide()"/>
                        <p:commandButton value="No" styleClass="pf-btn-cancel"
                                         style="float: left;"
                                         oncomplete="PF('saveContattiConfirmDlg').hide()"/>
                    </p:confirmDialog>

                    <!-- Confirm dialog for cancel -->
                    <p:confirmDialog widgetVar="discardContattiConfirmDlg" header="Conferma"
                                     message="Scartare le modifiche?" severity="alert">
                        <p:commandButton value="Si" styleClass="pf-btn-confirm"
                                         action="#{templateView.currentView.contattiBean.discardContatti}"
                                         update="@(.updatableContatti) @(.updateableContent) @(.tabScheda)"
                                         style="float: right"
                                         oncomplete="PF('discardContattiConfirmDlg').hide()"/>
                        <p:commandButton value="No" styleClass="pf-btn-cancel"
                                         style="float: left"
                                         oncomplete="PF('discardContattiConfirmDlg').hide()"/>
                    </p:confirmDialog>

                    <h:form styleClass="updatableContatti">
                        <div class="row">
                            <div class="col-12">
                                <p:commandButton value="UNLOCK" id="lockUnlockContattiBtn"
                                                 styleClass="#{templateView.currentView.contattiBean.locked
                                                             ? 'pf-btn-danger' : 'pf-btn-confirm'}"
                                                 update="@(.updatableContatti) @(.updateableContent) @(.tabScheda)"
                                                 icon="#{templateView.currentView.contattiBean.locked
                                                       ? 'fa fa-fw fa-lock' : 'fa fa-fw fa-lock-open'}"
                                                 disabled="#{not templateView.currentView.contattiBean.locked}"
                                                 action="#{templateView.currentView.contattiBean.unlockEditContatti}"/>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <div>
                                    <p:outputLabel for="valorePerContatto" value="Valore per Contatto"
                                                   styleClass="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputNumber id="valorePerContatto" disabled="true" readonly="true"
                                                   decimalPlaces="2"
                                                   value="#{templateView.currentView.contattiBean.valorePerContatto}"/>
                                </div>
                            </div>
                        </div>
                        <div class="row" style="margin-top: 10px;">
                            <div class="col-6">
                                <div>
                                    <p:outputLabel for="rettificaPerContatto" value="Rettifica Valore per Contatto"
                                                   styleClass="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputNumber id="rettificaPerContatto"
                                                   decimalPlaces="2"
                                                   disabled="#{templateView.currentView.contattiBean.locked}"
                                                   value="#{templateView.currentView.contattiBean.rettificaPerContatto}"/>
                                </div>
                            </div>
                        </div>
                        <div class="row" style="margin-top: 10px;">
                            <div class="col-6">
                                <div>
                                    <p:outputLabel for="numeroContatti" value="Numero Contatti"
                                                   styleClass="input-field-label"/>
                                </div>
                                <div>
                                    <p:inputNumber id="numeroContatti"
                                                   decimalPlaces="0"
                                                   disabled="#{templateView.currentView.contattiBean.locked}"
                                                   value="#{templateView.currentView.contattiBean.numeroContatti}">
                                        <p:ajax update="@(.saveContattiBtn)"/>
                                    </p:inputNumber>
                                </div>
                            </div>
                        </div>
                        <div class="row" style="margin-top: 10px;">
                            <div class="col-12">
                                <p:commandButton value="Salva" styleClass="pf-btn-confirm saveContattiBtn"
                                                 disabled="#{templateView.currentView.contattiBean.saveContattiBtnDisabled or templateView.currentView.contattiBean.locked}"
                                                 oncomplete="PF('saveContattiConfirmDlg').show()"/>
                                <p:commandButton value="Scarta" styleClass="pf-btn-cancel"
                                                 style="margin-left: 25px;"
                                                 update="@(.updatableContatti)"
                                                 disabled="#{templateView.currentView.contattiBean.locked}"
                                                 oncomplete="PF('discardContattiConfirmDlg').show()"/>
                            </div>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </div>
    <style>
        .input-field-label {
            font-size: 14px;
            font-weight: 500;
            color: black;
        }
    </style>
</ui:composition>
</html>
