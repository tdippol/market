<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <h:form>
                        <p:panel id="expandable_pianificazione_dialog_copiaIncollaTab" toggleable="true" toggleSpeed="500" closeSpeed="500"
                                 styleClass="pnlGrid_Header updateableContent expandable_pianificazione_dialog_copiaIncollaTab">
                            <f:facet name="header">
                                <p:outputLabel value="Copia / Incolla" />
                                <p:outputLabel value="numero massimo righe caricabili: 80" style="margin-left: 40px"/>
                            </f:facet>

                            <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                          class="ag-theme-balham copiaIncollaTab" pt:gridid="pianificazione_dialog_copiaIncollaTab">
                            </h:panelGroup>
                            <f:facet name="actions">
                                <p:inputText autocomplete="off" id="copiaIncollaTab_quickfilter" placeholder="Filtra..."
                                             styleClass="pnlGrid_Header filterInputText"
                                             onkeyup="onFilterTextBoxChangedpromoGrid('pianificazione_dialog_copiaIncollaTab',this.value)" />
                                <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                               onclick="expandGrid('pianificazione_dialog_copiaIncollaTab')" onerror="redirectToExpiredPage()" />
                                <p:commandLink title="Esporta con raggruppamenti"
                                               styleClass="pnlGrid_Header exportButtonGrouped"
                                               onclick="onBtExport('pianificazione_dialog_copiaIncollaTab','Export',true)"
                                               onerror="redirectToExpiredPage()" />
                                <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                               onclick="onBtExport('pianificazione_dialog_copiaIncollaTab','some title from backend')"
                                               onerror="redirectToExpiredPage()" />
                            </f:facet>

                            <script type="text/javascript">

                                var elementType = $('.elementTypeSelected').text();
                                var idPromozioneCorrente = #{templateView.currentView.pianificazionePromoDialogBackingBean.promozioneCorrente.id};
                                var idMeccanicaCorrente = #{templateView.currentView.pianificazionePromoDialogBackingBean.idMeccanicaCorrente};

                                var gridParams_pianificazione_dialog_copiaIncollaTab={
                                    gridId:'db_pianificazione_dialog_copiaIncollaTab',
                                    gridTabGroup:'pianificazione_dialog_inserisci_tabs',
                                    gridTabPosition:2,
                                    gridCode:'pianificazione_dialog_copiaIncollaTab',
                                    gridTitle:'Pianificazione - Dialog Inserisci - Copia/Incolla',
                                    url_columnDefs:contextPath+'/resources/pianificazionepromo/copiaIncollaTab/columnDef' + addUrlParamContesto(#{muiContext}),
                                    url_rowData:contextPath+'/resources/pianificazionepromo/copiaIncollaTab/rowData',
                                    url_customSort: contextPath + '/resources/grid/sorting/pianificazione_dialog_copiaIncollaTab'
                                };

                                var gridOptions_pianificazione_dialog_copiaIncollaTab={
                                    onCellEditingStopped : function(params){},
                                    onPasteStart: function(params){
                                    },
                                    onPasteEnd: function(params){
                                        showAgGridLoadingOverlay('pianificazione_dialog_copiaIncollaTab');
                                        setTimeout(function(){
                                                validateService(params) }
                                            ,200);
                                    },
                                    onCellValueChanged: function(event) {
                                        showAgGridLoadingOverlay('pianificazione_dialog_copiaIncollaTab');
                                        setTimeout(function(){
                                                validateService(event) }
                                            ,200);
                                    },
                                    onSortChanged: function (event) {
                                        onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_pianificazione_dialog_copiaIncollaTab.gridCode);
                                    }
                                };

                                function validateService(params){
                                    var rowIndex = params.rowIndex;
                                    var rowData  = getRowData('pianificazione_dialog_copiaIncollaTab');

                                    $.each(rowData,function(i,row){

                                        var rowIndex = i;
                                        let itemCode=row.codice.value.trim()

                                        if(itemCode === "") {
                                            itemCode = null;
                                            rowData[rowIndex].descrizione.value = "";
                                            delete rowData[rowIndex].isValidCode
                                        }else{
                                            //LT("ROW "+rowIndex+")",itemCode)

                                            $.ajax({
                                                type: "GET",
                                                url: contextPath+'/resources/pianificazionepromo/copiaIncollaTab/validate/'
                                                    + idPromozioneCorrente + '/' + idMeccanicaCorrente + '/'
                                                    + elementType + '/' + itemCode + addUrlParamContesto(#{muiContext}),
                                                contentType: "application/json",
                                                async:false,
                                                success: function (data) {
                                                    rowData[rowIndex].descrizione.value=data.descrizione
                                                    if(data.isValid){
                                                        rowData[rowIndex]['isValidCode']=true;
                                                        rowData[rowIndex]['idItem']=data.idItem;
                                                        if(data.itemBuyerId!=undefined){
                                                            rowData[rowIndex]['itemBuyerId']=data.itemBuyerId;
                                                        }
                                                    }else{
                                                        rowData[rowIndex]['isValidCode']=false;
                                                    }
                                                },
                                                error: function(jqXHR, exception, thrownError){
                                                    let callback={
                                                        condition: 'always',
                                                        action:'callback_err_validate',
                                                        params:['pianificazione_dialog_copiaIncollaTab']
                                                    }
                                                    ajaxErrorHandler(jqXHR, exception, thrownError,event,callback)
                                                }
                                            });
                                        }

                                        //End Callback
                                        if(rowData.length===(i+1)){
                                            addItemValidated()
                                            getGridOptionFromGridMap('pianificazione_dialog_copiaIncollaTab').api.setRowData(rowData);
                                            getGridOptionFromGridMap('pianificazione_dialog_copiaIncollaTab').api.refreshCells()
                                            hideAgGridLoadingOverlay('pianificazione_dialog_copiaIncollaTab')
                                        }
                                    })

                                }

                                function callback_err_validate(params){
                                    let gridCode=params[1];
                                    getGridOptionFromGridMap(gridCode).api.hideOverlay()
                                    getGridOptionFromGridMap(gridCode).api.refreshCells()
                                }

                                gridParams_pianificazione_dialog_copiaIncollaTab.customizeColumnDefs=[
                                    {columnDefId:"codice",property:"cellClassRules",value:{'notValidCode': 'data.isValidCode === false'}},
                                    {columnDefId:"descrizione",property:"cellClassRules",value:{'notValidCode': 'data.isValidCode === false'}}
                                ];


                                gridParams_pianificazione_dialog_copiaIncollaTab.additionColumnDefs=[
                                    { headerName: 'idItem',field:'idItem', width: 150, hide:true},
                                    { headerName: 'isValidCode',field:'isValidCode', width: 150 , hide:true},
                                    { headerName: 'itemBuyerId',field:'itemBuyerId', width: 150, hide:true }
                                ];


                                gridParams_pianificazione_dialog_copiaIncollaTab.overrideRowData=[
                                    {field:"codice",newValue:' '}
                                ];

                                gridParams_pianificazione_dialog_copiaIncollaTab.gridOptions=gridOptions_pianificazione_dialog_copiaIncollaTab;


                                $( document ).ready(function() {
                                    if(getCurrentTab(gridParams_pianificazione_dialog_copiaIncollaTab.gridTabGroup)==gridParams_pianificazione_dialog_copiaIncollaTab.gridTabPosition) {
                                        creaGriglia(gridParams_pianificazione_dialog_copiaIncollaTab);
                                    }
                                });



                                function addItemValidated() {
                                    let updatedRowData=getLeafRowData('pianificazione_dialog_copiaIncollaTab')
                                    let arr_pastedRows=[]
                                    $.each(updatedRowData, function( key, row ) {
                                        if(row.isValidCode!=undefined){
                                            arr_pastedRows.push(row)
                                        }
                                    });
                                    selezionaItem([{name: "itemSelected", value: JSON.stringify(arr_pastedRows)}]);

                                }
                            </script>
                            <style>
                                .ag-header-cell {
                                    background-color: inherit !important;
                                }
                                .notValidCode{
                                    background-color: #f8d7da !important;
                                    color: #721c24 !important;
                                    font-weight:bold !important;
                                }


                            </style>
                        </p:panel>
                        <p:remoteCommand name="selezionaItem" update="pianificazionePromoDialogConfirmBtn"
                                         action="#{templateView.currentView.pianificazionePromoDialogBackingBean.selezionaItems}"/>
                    </h:form>
                    <p:outputLabel
                            value="#{ templateView.currentView.pianificazionePromoDialogBackingBean.idTipoElemento }"
                            class="elementTypeSelected" style="visibility: hidden;"/>

                    <p:outputLabel
                            value="#{ templateView.currentView.pianificazionePromoDialogBackingBean.idMeccanicaCorrente }"
                            class="idMeccanicaCorrente" style="visibility: hidden;"/>

                    <p:outputLabel value="#{templateView.currentView.pianificazionePromoDialogBackingBean.promozioneCorrente.id}"
                                   class="idPromozioneCorrente" style="visibility: hidden;"/>

                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
