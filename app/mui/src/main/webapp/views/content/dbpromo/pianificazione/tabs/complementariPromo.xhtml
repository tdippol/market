<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">


                    <p:panel id="expandable_db_pianificazione_complementari" toggleable="true" toggleSpeed="500" closeSpeed="500"
                             styleClass="pnlGrid_Header updateableContent expandable_db_pianificazione_complementari">
                        <f:facet name="header">
                            <p:outputLabel value="Complementari" />
                        </f:facet>

                        <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                                      class="ag-theme-balham pianificazione_complementari" pt:gridid="db_pianificazione_complementari">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="pianificazione_complementari_quickfilter" placeholder="Filtra..."
                                         styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_pianificazione_complementari',this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_pianificazione_complementari')" onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExport('db_pianificazione_complementari','Complementari',true)"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_pianificazione_complementari','Complementari',false)"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>

                        <script type="text/javascript">
						var currentPromoId = #{templateView.currentView.idPromozioneCorrente};
                        var gridParams_complementari = {
                            gridTabGroup: 'schedaPianificazione_tabs',
                            gridTabPosition: #{templateView.currentView.indexOf('TAB_COMPLEMENTARI')},
                            gridCode: 'db_pianificazione_complementari',
                            gridTitle: 'Pianificazione - Tab Complementari',
                            url_columnDefs: contextPath + '/resources/pianificazionepromo/planning/columnDef/complementari/' + currentPromoId + addUrlParamContesto(#{muiContext}),
                            url_rowData: contextPath + '/resources/pianificazionepromo/planning/rowData/complementari/' + currentPromoId,
                            url_customSort: contextPath + '/resources/grid/sorting/db_pianificazione_complementari'
                        };
                        var gridOptions={
                            onSortChanged: function (event) {
                                onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_complementari.gridCode);
                            }
                        };
                        gridParams_complementari.customizeColumnDefs = [
                            { columnDefId: "FILE_SCARTI", property: "hide", value: true}
                        ];
                        gridParams_complementari.additionColumnDefs = [
                            { headerName: 'File Scarti', width: 100, cellRenderer: 'Complementari_downloadFileScarti', suppressMovable: true }
                        ];
                        gridParams_complementari.gridOptions=gridOptions;

                        $(document).ready(function() {
                        	if (getCurrentTab(gridParams_complementari.gridTabGroup) == gridParams_complementari.gridTabPosition) {
    							creaGriglia(gridParams_complementari);		
            	        	}
                        });

                        function closeAndRefreshData() {
                            /*PF('managePromoStatusConfirmDialog').hide();
                            $.get(contextPath+'/resources/grid/pianificazionepromo/complementari/rowData/' + #{ templateView.currentView.idPromozioneCorrente }, function (data, status) {
                                complementariGridOptions.api.setRowData(data);
                                // refreshHeaderData();
                            });*/
                        }

                        </script>
                        <style>
                            [col-id~=ag-Grid-AutoColumn],
                            [col-id~=tipoPuntoVendita],
                            [col-id~=defaultFlag] {
                                font-weight: bold;
                            }

                            [col-id~=flag],
                            [col-id~=dataInizio],
                            [col-id~=dataFine] {
                                background-color: white;
                            }

                            .ag-header-cell {
                                background-color: inherit !important;
                            }

                            body .splitButtonStyle .ui-button {
                                background-color: #178b68 !important;
                                color: #ffffff;
                            }

                            body .splitButtonStyle .ui-button.ui-state-hover {
                                background-color: #178b68 !important;
                            }

                            body .splitButtonStyle .ui-button.ui-state-focus {
                                background-color: #178b68 !important;
                                outline: 0 none;
                            }

                            .menuItemStyle {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a:hover {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .ui-dialog-title {
                                font-size: 18px;
                            }
                        </style>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
