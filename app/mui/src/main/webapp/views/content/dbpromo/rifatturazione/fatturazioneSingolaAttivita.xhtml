<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:ui="http://java.sun.com/jsf/facelets"
>
<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <h:form id="fatturazioneSingolaAttivitaHeaderForm" styleClass="fatturazioneSingolaAttivitaHeader"
                style="margin-top: 10px; margin-bottom: 30px;">
            <div class="row">
                <div class="col-2">
                    <div>
                        <p:outputLabel for="compratore" value="Compratore" styleClass="label-txt"/>
                    </div>
                    <div>
                        <p:selectOneMenu id="compratore" styleClass="input-field"
                                         filter="true" filterMatchMode="contains"
                                         value="#{templateView.currentView.idCompratoreSelected}">
                            <p:ajax update="promozione flagRifatturazioneAttivita wrapperNumeroContatti @(.updateableRifatturazione)"/>
                            <f:selectItem itemLabel="Seleziona compratore" noSelectionOption="true"/>
                            <f:selectItems value="#{templateView.currentView.compratori}" var="c"
                                           itemLabel="#{c.fullDescription}" itemValue="#{c.id}"/>
                        </p:selectOneMenu>
                    </div>
                </div>
                <div class="col-4">
                    <div>
                        <p:outputLabel for="promozione" value="Promozione" styleClass="label-txt"/>
                    </div>
                    <div>
                        <p:selectOneMenu id="promozione" styleClass="input-field"
                                         filter="true" filterMatchMode="contains"
                                         value="#{templateView.currentView.idPromozioneSelected}">
                            <p:ajax update="flagRifatturazioneAttivita wrapperNumeroContatti @(.updateableRifatturazione)"/>
                            <f:selectItem itemLabel="Seleziona promozione" noSelectionOption="true"/>
                            <f:selectItems value="#{templateView.currentView.promozioni}" var="p"
                                           itemLabel="#{p.descrizioneEstesa}" itemValue="#{p.id}"/>
                        </p:selectOneMenu>
                    </div>
                </div>
                <div class="col-2">
                    <div>
                        <p:outputLabel for="flagRifatturazioneAttivita" value="Flag rifatturazione attività"
                                       styleClass="label-txt"/>
                    </div>
                    <div>
                        <p:inputText id="flagRifatturazioneAttivita" readonly="true" styleClass="input-field"
                                     value="#{templateView.currentView.flagRifatturazioneAttivita}"/>
                    </div>
                </div>
                <h:panelGroup id="wrapperNumeroContatti" layout="block" class="col-2">
                    <h:panelGroup rendered="#{templateView.currentView.numeroContattiRendered}">
                        <div>
                            <p:outputLabel for="numeroContatti" value="Numero Contatti"
                                           styleClass="label-txt"/>
                        </div>
                        <div>
                            <p:inputText id="numeroContatti" readonly="true" styleClass="input-field"
                                         value="#{templateView.currentView.numeroContatti}"/>
                        </div>
                    </h:panelGroup>
                </h:panelGroup>
            </div>
        </h:form>
        <p:panel id="expandable_db_grid_rifatturazione" toggleable="true" toggleSpeed="500"
                 closeSpeed="500" styleClass="pnlGrid_Header updateableRifatturazione">
            <f:facet name="header">
                <p:outputLabel value=""/>
            </f:facet>
            <h:panelGroup layout="block" style="height: 60vh; width: 100%;"
                          class="ag-theme-balham grid_rifatturazione"
                          pt:gridid="db_grid_rifatturazione">
            </h:panelGroup>
            <f:facet name="actions">
                <p:inputText autocomplete="off" id="rifatturazioneFilter"
                             placeholder="Filtra..." styleClass="pnlGrid_Header filterInputText"
                             onkeyup="onFilterTextBoxChangedpromoGrid('db_grid_rifatturazione', this.value)"/>
                <!--suppress JSUnresolvedReference -->
                <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                               onclick="expandGrid('db_grid_rifatturazione')"
                               onerror="redirectToExpiredPage()"/>
                <!--suppress JSUnresolvedReference -->
                <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                               onclick="onBtExport('db_grid_rifatturazione', 'Riepilogo Rifatturazioni')"
                               onerror="redirectToExpiredPage()"/>
            </f:facet>
            <!--suppress JSUnresolvedReference -->
            <script type="application/javascript">
                function loadRifatturazioni(idCompratore, idPromozione) {
                    if (idCompratore &amp;&amp; idPromozione) {
                        var rifatturazioniGridParams = {
                            gridCode: 'db_grid_rifatturazione',
                            gridTitle: 'Rifatturazioni',
                            url_columnDefs: contextPath + '/resources/rifatturazione/singola-attivita/'
                                + idPromozione + '/columnDef',
                            url_rowData: contextPath + '/resources/rifatturazione/singola-attivita/'
                                + idPromozione + '/compratore/' + idCompratore + '/rowData',
                            url_customSort: contextPath + '/resources/grid/sorting/db_grid_rifatturazione',
                            gridOptions: {
                                onCellValueChanged: function (event) {
                                    updateCellValue(event);
                                },
                                onSortChanged: function (event) {
                                    onSortChanged(event, contextPath + '/resources/grid/sorting/save/db_grid_rifatturazione');
                                }
                            }
                        };
                        creaGriglia(rifatturazioniGridParams);
                    } else {
                        console.error("Unable to load grid; missing idCompratore or idPromozione parameter(s)");
                        console.error("idCompratore:", idCompratore);
                        console.error("idPromozione:", idPromozione);
                    }
                }

                function updateCellValue(event) {
                    let id = event.data.id.value;
                    let fieldCode = event.column.colDef.field;
                    let value = event.data[fieldCode].value;
                    if (id &amp;&amp; fieldCode) {
                        $.ajax({
                            type: 'POST',
                            url: contextPath + '/resources/rifatturazione/singola-attivita/' + id,
                            contentType: 'application/json',
                            data: JSON.stringify({"field": fieldCode, "value": value}),
                            success: function (data, textStatus, jqXHR) {
                                let rowNode = event.api.getRowNode(event.node.id);
                                if (rowNode &amp;&amp; data.rowData &amp;&amp; data.rowData.length > 0) {
                                    rowNode.setData(data.rowData[0]);
                                }
                                addInfoGrowl([
                                    {name: "title", value: "Rifatturazione"},
                                    {name: "message", value: "Modifica avvenuta con successo!"}
                                ]);
                            },
                            error: function (jqXHR, exception, thrownError) {
                                console.error("Error updating rifatturazione id: " + id + "; field: " + fieldCode + "; value: " + value);
                                ajaxErrorHandler(jqXHR, exception, thrownError, event);
                            }
                        })
                    } else {
                        console.error("Unable to update cell value; missing id, fieldCode or value parameter(s)");
                        addErrorGrowl([
                            {name: "title", value: "Errore"},
                            {name: "message", value: "Modifica non riuscita!"}
                        ]);
                    }
                }
            </script>
        </p:panel>
    </div>

    <style>
        .input-field {
            border-radius: 3px;
            border-color: gray;
            width: 100%;
            background-color: transparent;
        }

        .label-txt {
            font-size: 14px;
        }
    </style>
</ui:composition>
</html>
