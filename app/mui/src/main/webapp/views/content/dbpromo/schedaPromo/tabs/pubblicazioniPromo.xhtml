<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition>
    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">
                    <!-- DIALOG -->
                    <p:dialog widgetVar="pubblicazioneTestataConfirmDialog" header="Gestione Pubblicazione" width="500"
                              height="300">
                        <div class="row">
                            <div class="col-12">
                                <div>
                                    <p:outputLabel for="dialogPT" value="Promozione" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:inputText id="dialogPT" readonly="true" styleClass="updateableContent"
                                                 style="width: 100%;"
                                                 value="#{templateView.currentView.promotionSelected.descrizioneEstesa}" />
                                </div>
                            </div>
                            <div class="col-12" style="margin-top: 20px;">
                                <div>
                                    <p:outputLabel for="dialogCurrentStatePT" value="Stato Corrente"
                                                   style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:inputText id="dialogCurrentStatePT" readonly="true"
                                                 styleClass="updateableContent" style="width: 100%;"
                                                 value="#{templateView.currentView.statoCorrente.statoPromozioneEntity.codiceStato} - #{templateView.currentView.statoCorrente.statoPromozioneEntity.label}" />
                                </div>
                            </div>
                            <div class="col-12" style="margin-top: 20px;">
                                <div>
                                    <p:outputLabel for="dialogDateLastPubblicationPT"
                                                   value="Data e Stato Ultima Pubblicazione" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:inputText id="dialogDateLastPubblicationPT" readonly="true"
                                                 styleClass="updateableContent" style="width: 100%;"
                                                 value="#{templateView.currentView.lastPublicationDateStr}">
                                        <f:convertDateTime pattern="E dd-MM-yyyy" locale="it_IT" />
                                    </p:inputText>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <p:commandButton value="Annulla" styleClass="ui-confirmdialog-no"
                                                 style="float: left;" onclick="PF('pubblicazioneTestataConfirmDialog').hide()" />
                            </div>
                            <div class="col-6">
                                <p:commandButton id="confirmBtn" value="Conferma" styleClass="ui-confirmdialog-yes"
                                                 action="#{templateView.currentView.insertNewPubblication()}"
                                                 oncomplete="confirmPubblicazioneTestata()" />
                            </div>
                        </div>
                    </p:dialog>
                    <!-- DIALOG -->
                    <div class="col-12">
                        <p:commandButton value="Pubblicazione Testata" style="margin-right: 20px; border-radius: 5px;"
                                         styleClass="updateableContent pf-btn-confirm"
                                         update="@(.updateableContent)"
                                         onclick="PF('pubblicazioneTestataConfirmDialog').show()"
                                         disabled="#{templateView.currentView.buttonPubblicazioneDisabled or not templateView.currentView.tabEditRendered}"
                                         rendered="false"
                        />
                    </div>
                    <p:panel id="expandable_db_schedapromo_pubblicazioni" toggleable="true" toggleSpeed="500" closeSpeed="500"
                             styleClass="pnlGrid_Header updateableContent expandable_db_schedapromo_pubblicazioni">
                        <f:facet name="header">
                            <p:outputLabel value="Storico Pubblicazioni" />
                        </f:facet>

                        <h:panelGroup 
                        	layout="block" 
                        	style="height: 60vh; width: 100%;"
							class="ag-theme-balham pubblicazioni" 
							pt:gridid="db_schedapromo_pubblicazioni">
                        </h:panelGroup>
                        <f:facet name="actions">
                            <p:inputText autocomplete="off" id="pubblicazioni_quickfilter" placeholder="Filtra..."
                                         styleClass="pnlGrid_Header filterInputText"
                                         onkeyup="onFilterTextBoxChangedpromoGrid('db_schedapromo_pubblicazioni',this.value)" />
                            <p:commandLink title="Espandi Griglia" styleClass="pnlGrid_Header expandButton"
                                           onclick="expandGrid('db_schedapromo_pubblicazioni')" onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta con raggruppamenti"
                                           styleClass="pnlGrid_Header exportButtonGrouped"
                                           onclick="onBtExportGrouped('db_schedapromo_pubblicazioni','some title from backend')"
                                           onerror="redirectToExpiredPage()" />
                            <p:commandLink title="Esporta Excel" styleClass="pnlGrid_Header exportButton"
                                           onclick="onBtExport('db_schedapromo_pubblicazioni','some title from backend')"
                                           onerror="redirectToExpiredPage()" />
                        </f:facet>

                        <script type="text/javascript">
                		var gridParams_schedaPromoPubblicazioni={
                            gridId:'pubblicazioni',
                            gridTabGroup:'schedaPromo_tabs',
                            gridTabPosition: #{templateView.currentView.indexOf('TAB_PUBBLICAZIONI')},
                            gridCode:'db_schedapromo_pubblicazioni',
                            gridTitle:'SchedaPromo - Pubblicazioni',
                            url_columnDefs:contextPath+'/resources/grid/schedapromo/pubblicazioni/columnDef' + addUrlParamContesto(#{muiContext}),
                            url_rowData:contextPath+'/resources/grid/schedapromo/pubblicazioni/rowData/' + #{ templateView.currentView.idPromozioneCorrente },
                            url_customSort: contextPath + '/resources/grid/sorting/db_schedapromo_pubblicazioni'
                        };
                        
                		var gridOptions={
                            onSortChanged: function (event) {
                                onSortChanged(event, contextPath + '/resources/grid/sorting/save/' + gridParams_schedaPromoPubblicazioni.gridCode);
                            }
                        };
                			
                		gridParams_schedaPromoPubblicazioni.gridOptions=gridOptions;  

                			  
                	        $(document).ready(function() {
                	        	if(currentActiveTab==gridParams_schedaPromoPubblicazioni.gridTabPosition)
                    			{
                    	        	creaGriglia(gridParams_schedaPromoPubblicazioni);
                	        	}
                	        });
                	        
                	        
                            function confirmPubblicazioneTestata() {
                                PF('pubblicazioneTestataConfirmDialog').hide();

                                $.ajax({
                                    type: "GET",
                                    url: contextPath+'/resources/grid/schedapromo/pubblicazioni/rowData/' + #{ templateView.currentView.idPromozioneCorrente },
                                    contentType: "application/json",
                                    success: function (data) {
                                    	getGridOptionFromGridMap('db_schedapromo_pubblicazioni').api.setRowData(data.rowData);
                                        refreshHeaderData();
                                    },
									error: ajaxErrorHandler
                                });
                            }

                        </script>
                        <style>
                            
                            .ag-header-cell {
                                background-color: inherit !important;
                            }

                            body .splitButtonStyle .ui-button {
                                background-color: #178b68 !important;
                                color: #ffffff;
                            }

                            body .splitButtonStyle .ui-button.ui-state-hover {
                                background-color: #178b68 !important;
                            }

                            body .splitButtonStyle .ui-button.ui-state-focus {
                                background-color: #178b68 !important;
                                outline: 0 none;
                            }

                            .menuItemStyle {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .menuItemStyle a:hover {
                                background-color: #178b68 !important;
                                color: #ffffff !important;
                            }

                            .ui-dialog-title {
                                font-size: 18px;
                            }
                        </style>
                    </p:panel>
                </div>
            </div>
        </div>
    </div>
</ui:composition>

</html>
