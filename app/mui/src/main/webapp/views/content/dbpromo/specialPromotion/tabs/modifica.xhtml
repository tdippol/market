<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>

    <div class="k-content k-grid__item k-grid__item--fluid col-12" id="k_content">
        <div class="row">
            <div class="col-12">
                <div id="k_grid_portletpromoGrid" class="k-portlet">

                    <h:form styleClass="updateableContent">

                        <p:confirmDialog widgetVar="dlgDiscardEditTestata"
                                         header="Conferma necessaria"
                                         message="Scartare le modifiche?"
                                         severity="alert">
                            <p:commandButton value="SI"
                                             action="#{templateView.currentView.discardEditTestata}"
                                             update="@(.updateableContent) @(.tabScheda)"
                                             oncomplete="PF('dlgDiscardEditTestata').hide()" />
                            <p:commandButton value="NO"
                                             type="button"
                                             style="float: right;"
                                             onclick="PF('dlgDiscardEditTestata').hide()" />
                        </p:confirmDialog>

                        <p:confirmDialog widgetVar="dlgDeleteTestata"
                                         header="Conferma eliminazione"
                                         styleClass="dlgDeleteTestataClass"
                                         message="Sei sicuro di voler eliminare la Special Promotion selezionata?"
                                         severity="alert">
                            <p:commandButton value="SI"
                                             action="#{templateView.currentView.deleteTestata}"
                                             update="@(.updateableContent) @(.tabScheda)"
                                             oncomplete="PF('dlgDeleteTestata').hide()" />
                            <p:commandButton value="NO"
                                             type="button"
                                             style="float: right;"
                                             onclick="PF('dlgDeleteTestata').hide()" />
                        </p:confirmDialog>

                        <div class="row">
                            <div class="col-12">
                                <p:commandButton value="UNLOCK"
                                                 id="lockUnlockBtn"
                                                 style="float: right;"
                                                 styleClass="#{templateView.currentView.editTestata.locked ? 'pf-btn-danger' : 'pf-btn-confirm'}"
                                                 update="@(.updateableContent) @(.tabScheda)"
                                                 icon="#{templateView.currentView.editTestata.locked ? 'fa fa-fw fa-lock' : 'fa fa-fw fa-lock-open'}"
                                                 action="#{templateView.currentView.unlockEditTestata}" />
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-4">
                                <div>
                                    <p:outputLabel for="description" value="Descrizione" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:inputText id="description"
                                                 style="width: 100%;"
                                                 disabled="#{templateView.currentView.editTestata.locked}"
                                                 value="#{templateView.currentView.editTestata.description}" />
                                </div>
                            </div>

                            <div class="col-2">
                                <div>
                                    <p:outputLabel for="startDate" value="Data Inizio" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:datePicker id="startDate"
                                                  inputStyle="width: 100%;"
                                                  disabled="#{templateView.currentView.editTestata.locked}"
                                                  value="#{templateView.currentView.editTestata.startDate}"
                                                  showOn="button"
                                                  pattern="dd-MM-yyyy"
                                                  locale="it" />
                                </div>
                            </div>

                            <div class="col-2">
                                <div>
                                    <p:outputLabel for="endDate" value="Data Fine" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:datePicker id="endDate"
                                                  inputStyle="width: 100%;"
                                                  disabled="#{templateView.currentView.editTestata.locked}"
                                                  value="#{templateView.currentView.editTestata.endDate}"
                                                  showOn="button"
                                                  pattern="dd-MM-yyyy"
                                                  locale="it" />
                                </div>
                            </div>


                            <div class="col-2">
                                <div>
                                    <p:outputLabel for="reminderDate" value="Data Reminder" style="font-size: 14px;" />
                                </div>
                                <div>
                                    <p:datePicker id="reminderDate"
                                                  inputStyle="width: 100%;"
                                                  disabled="#{templateView.currentView.editTestata.locked}"
                                                  value="#{templateView.currentView.editTestata.reminderDate}"
                                                  showOn="button"
                                                  pattern="dd-MM-yyyy"
                                                  locale="it" />
                                </div>
                            </div>
                        </div>

                        <div class="row" style="margin-top: 30px;">
                            <div class="col-12">
                                <p:commandButton value="Elimina"
                                                 styleClass="pf-btn-danger"
                                                 style="float: left;"
                                                 icon="far fa-fw fa-trash-alt"
                                                 disabled="#{templateView.currentView.editTestata.locked}"
                                                 update="@(.dlgDeleteTestataClass)"
                                                 oncomplete="PF('dlgDeleteTestata').show()" />

                                <p:commandButton value="Salva"
                                                 styleClass="pf-btn-confirm"
                                                 style="float: right;"
                                                 disabled="#{templateView.currentView.editTestata.locked}"
                                                 action="#{templateView.currentView.saveEditTestata}"
                                                 update="@(.updateableContent) @(.tabScheda)" />

                                <p:commandButton value="Annulla"
                                                 styleClass="pf-btn-cancel"
                                                 style="float: right; margin-right: 20px;"
                                                 disabled="#{templateView.currentView.editTestata.locked}"
                                                 oncomplete="PF('dlgDiscardEditTestata').show()" />
                            </div>
                        </div>

                    </h:form>

                </div>
            </div>
        </div>
    </div>

</ui:composition>
</html>
